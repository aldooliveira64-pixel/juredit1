// ── API CALL ──────────────────────────────────────────────────────
async function callClaude(body){
  const k=getKey();
  if(!k)throw new Error('Chave não configurada.');
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':k,
      'anthropic-version':'2023-06-01',
      'anthropic-beta':'web-search-2025-03-05',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body:JSON.stringify(body),
  });
  const d=await r.json();
  if(!r.ok)throw new Error(d?.error?.message||`Erro ${r.status}`);
  return d;
}

// ── DOCX ENGINE v1 (JurDocxEngine_v1) ────────────────────────────
// Motor unificado — substitui o motor antigo do index
const CRC_TABLE=(()=>{const t=new Uint32Array(256);for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[i]=c;}return t;})();

function strToU8(str){return new TextEncoder().encode(str);}
// alias para compatibilidade com código legado do index
const s8=strToU8;
function concatU8(arrays){const total=arrays.reduce((s,a)=>s+a.length,0);const out=new Uint8Array(total);let p=0;for(const a of arrays){out.set(a,p);p+=a.length;}return out;}
// alias legado
const cat=concatU8;
function setU16LE(buf,off,v){buf[off]=v&0xFF;buf[off+1]=(v>>8)&0xFF;}
function setU32LE(buf,off,v){buf[off]=v&0xFF;buf[off+1]=(v>>8)&0xFF;buf[off+2]=(v>>16)&0xFF;buf[off+3]=(v>>24)&0xFF;}
// aliases legados
const sl=setU16LE;
const sl4=setU32LE;
function buildZip(files){const localParts=[],cdParts=[];let offset=0;for(const f of files){const name=strToU8(f.name),data=f.data,crc=crc32(data),sz=data.length;const lh=new Uint8Array(30+name.length);setU32LE(lh,0,0x04034b50);setU16LE(lh,4,20);setU16LE(lh,6,0);setU16LE(lh,8,0);setU16LE(lh,10,0);setU16LE(lh,12,0);setU32LE(lh,14,crc);setU32LE(lh,18,sz);setU32LE(lh,22,sz);setU16LE(lh,26,name.length);setU16LE(lh,28,0);lh.set(name,30);const cd=new Uint8Array(46+name.length);setU32LE(cd,0,0x02014b50);setU16LE(cd,4,20);setU16LE(cd,6,20);setU16LE(cd,8,0);setU16LE(cd,10,0);setU16LE(cd,12,0);setU16LE(cd,14,0);setU32LE(cd,16,crc);setU32LE(cd,20,sz);setU32LE(cd,24,sz);setU16LE(cd,28,name.length);setU16LE(cd,30,0);setU16LE(cd,32,0);setU16LE(cd,34,0);setU16LE(cd,36,0);setU32LE(cd,38,0);setU32LE(cd,42,offset);cd.set(name,46);localParts.push(lh,data);cdParts.push(cd);offset+=lh.length+sz;}const cdData=concatU8(cdParts);const eocd=new Uint8Array(22);setU32LE(eocd,0,0x06054b50);setU16LE(eocd,4,0);setU16LE(eocd,6,0);setU16LE(eocd,8,files.length);setU16LE(eocd,10,files.length);setU32LE(eocd,12,cdData.length);setU32LE(eocd,16,offset);setU16LE(eocd,20,0);return concatU8([...localParts,cdData,eocd]);}
// alias legado
const mkzip=buildZip;
function ex(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// alias v1
const esc=ex;
const SUP_MAP={"⁰":0,"¹":1,"²":2,"³":3,"⁴":4,"⁵":5,"⁶":6,"⁷":7,"⁸":8,"⁹":9,"¹⁰":10,"¹¹":11,"¹²":12,"¹³":13,"¹⁴":14,"¹⁵":15,"¹⁶":16,"¹⁷":17,"¹⁸":18,"¹⁹":19,"²⁰":20,"²¹":21,"²²":22,"²³":23,"²⁴":24,"²⁵":25,"²⁶":26,"²⁷":27,"²⁸":28,"²⁹":29,"³⁰":30,"³¹":31,"³²":32,"³³":33,"³⁴":34,"³⁵":35,"³⁶":36,"³⁷":37,"³⁸":38,"³⁹":39,"⁴⁰":40,"⁴¹":41,"⁴²":42,"⁴³":43,"⁴⁴":44,"⁴⁵":45,"⁴⁶":46,"⁴⁷":47,"⁴⁸":48,"⁴⁹":49,"⁵⁰":50,"⁵¹":51,"⁵²":52,"⁵³":53,"⁵⁴":54,"⁵⁵":55,"⁵⁶":56,"⁵⁷":57,"⁵⁸":58,"⁵⁹":59,"⁶⁰":60,"⁶¹":61,"⁶²":62,"⁶³":63,"⁶⁴":64,"⁶⁵":65,"⁷⁰":70,"⁸⁰":80,"⁹⁰":90,"⁹⁹":99};
const SUP_CHARS="⁰¹²³⁴⁵⁶⁷⁸⁹";
// aliases legados
const SC=SUP_CHARS;
const SM=SUP_MAP;
const SUP_ENTRIES=Object.entries(SUP_MAP).sort((a,b)=>b[0].length-a[0].length);
const SE=SUP_ENTRIES;
function supToNum(s){for(const[k,v]of SUP_ENTRIES){if(s.startsWith(k))return{n:v,len:k.length};}return null;}
const s2n=supToNum;
function parseNoteNum(line){const res=supToNum(line);if(res)return{num:res.n,text:line.slice(res.len).trim()};const m=line.match(/^(\d{1,2})[.\):\s]\s*(.+)/);if(m)return{num:parseInt(m[1]),text:m[2]};return null;}
const pNN=parseNoteNum;
const emptyP=()=>`<w:p><w:pPr><w:spacing w:before="0" w:after="60"/></w:pPr></w:p>`;
const eP=emptyP;
function wRun(r,pt=12){const sz=pt*2;const rpr=[r.bold?`<w:b/><w:bCs/>`:(r.b?`<w:b/><w:bCs/>`:""),r.italic?`<w:i/><w:iCs/>`:(r.i?`<w:i/><w:iCs/>`:""),r.sup?`<w:vertAlign w:val="superscript"/>`:"",`<w:rFonts w:ascii="Times New Roman" w:hAnsi="Times New Roman" w:cs="Times New Roman"/>`,`<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/>`].join("");return`<w:r><w:rPr>${rpr}</w:rPr><w:t xml:space="preserve">${ex(r.text||r.t||"")}</w:t></w:r>`;}
const wR=wRun;
function wPara(runs,o={}){const al=o.center?(o.c?"center":"center"):(o.c?"center":(o.align||o.a||"both"));let indXml="";if(o.indent||o.indentLeft||o.indentRight||o.in||o.il||o.ir){const fl=(o.indent||o.in)?`w:firstLine="${o.indent||o.in}"`:"";const lft=(o.indentLeft||o.il)?`w:left="${o.indentLeft||o.il}"`:"";const rgt=(o.indentRight||o.ir)?`w:right="${o.indentRight||o.ir}"`:"";indXml=`<w:ind ${fl} ${lft} ${rgt}/>`;}const ppr=`<w:pPr><w:spacing w:before="${o.spaceBefore||o.sb||0}" w:after="${o.spaceAfter||o.sa||60}" w:line="${o.lineVal||o.lv||276}" w:lineRule="auto"/>${indXml}<w:jc w:val="${al}"/>${o.border?`<w:pBdr><w:bottom w:val="single" w:sz="6" w:space="1" w:color="000000"/></w:pBdr>`:""}</w:pPr>`;return`<w:p>${ppr}${runs.map(r=>wRun(r,o.sizePt||o.pt||12)).join("")}</w:p>`;}
const wP=wPara;
function wFootnote(id,text){const sz=18;const font=`<w:rFonts w:ascii="Times New Roman" w:cs="Times New Roman" w:eastAsia="Times New Roman" w:hAnsi="Times New Roman"/>`;const parts=[];const re=/\*([^*]+)\*/g;let last=0,m;while((m=re.exec(text))!==null){if(m.index>last)parts.push({t:text.slice(last,m.index),i:false});parts.push({t:m[1],i:true});last=m.index+m[0].length;}if(last<text.length)parts.push({t:text.slice(last),i:false});const hasItalic=parts.some(p=>p.i);let runsXml;if(!hasItalic){const txt=parts.map(p=>p.t).join('');runsXml=`<w:r><w:rPr>${font}<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/></w:rPr><w:t xml:space="preserve"> ${ex(txt)}</w:t></w:r>`;}else{runsXml=`<w:r><w:rPr>${font}<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/></w:rPr><w:t xml:space="preserve"> </w:t></w:r>`+parts.map(p=>{const rpr=[p.i?`<w:i/><w:iCs/>`:"",font,`<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/>`].join("");return`<w:r><w:rPr>${rpr}</w:rPr><w:t xml:space="preserve">${ex(p.t)}</w:t></w:r>`;}).join('');}return`<w:footnote w:id="${id}"><w:p><w:pPr><w:spacing w:line="220" w:lineRule="auto"/><w:jc w:val="both"/></w:pPr><w:r><w:rPr><w:rStyle w:val="FootnoteReference"/></w:rPr><w:footnoteRef/></w:r>${runsXml}</w:p></w:footnote>`;}
const wFN=wFootnote;
function wFootnoteRef(id){return`<w:r><w:rPr><w:rStyle w:val="FootnoteReference"/></w:rPr><w:footnoteReference w:id="${id}"/></w:r>`;}
const wFNR=wFootnoteRef;
function parseInlineWithFn(str){str=str.replace(/\[Fonte:[^\]]+\]/g,"");const out=[],re=/(\*\*[^*]+\*\*|\*[^*]+\*|[⁰¹²³⁴⁵⁶⁷⁸⁹]+|\[(\d{1,2})\]|\((\d{1,2})\)(?=\s|$))/g;let last=0,m;while((m=re.exec(str))!==null){if(m.index>last)out.push({text:str.slice(last,m.index),bold:false,italic:false,sup:false,fnNum:null});const tok=m[0];if(/^\*\*[^*]+\*\*$/.test(tok))out.push({text:tok.slice(2,-2),bold:true,italic:false,sup:false,fnNum:null});else if(/^\*[^*]+\*$/.test(tok))out.push({text:tok.slice(1,-1),bold:false,italic:true,sup:false,fnNum:null});else{let n=null;const res=supToNum(tok);if(res){n=res.n;}else{const nm=tok.match(/^[\[\(](\d{1,2})[\]\)]$/);if(nm)n=parseInt(nm[1]);}out.push({text:tok,bold:false,italic:false,sup:true,fnNum:n});}last=m.index+tok.length;}if(last<str.length)out.push({text:str.slice(last),bold:false,italic:false,sup:false,fnNum:null});return out.filter(r=>r.text||(r.sup&&r.fnNum));}
const pIF=parseInlineWithFn;
function wParaWithFn(rawLine,o={},footnoteMap=null){const al=o.center?(o.c?"center":"center"):(o.c?"center":(o.align||o.a||"both"));let indXml="";if(o.indent||o.indentLeft||o.indentRight||o.in||o.il||o.ir){const fl=(o.indent||o.in)?`w:firstLine="${o.indent||o.in}"`:"";const lft=(o.indentLeft||o.il)?`w:left="${o.indentLeft||o.il}"`:"";const rgt=(o.indentRight||o.ir)?`w:right="${o.indentRight||o.ir}"`:"";indXml=`<w:ind ${fl} ${lft} ${rgt}/>`;}const ppr=`<w:pPr><w:spacing w:before="${o.spaceBefore||o.sb||0}" w:after="${o.spaceAfter||o.sa||60}" w:line="${o.lineVal||o.lv||276}" w:lineRule="auto"/>${indXml}<w:jc w:val="${al}"/></w:pPr>`;const tokens=parseInlineWithFn(rawLine);const pt=o.sizePt||o.pt||12;const sz=pt*2;const FONT=`<w:rFonts w:ascii="Times New Roman" w:cs="Times New Roman" w:eastAsia="Times New Roman" w:hAnsi="Times New Roman"/>`;const runs=tokens.map(r=>{if(r.sup&&r.fnNum&&r.fnNum>0){if(footnoteMap&&footnoteMap[r.fnNum])return wFootnoteRef(r.fnNum);if(footnoteMap&&!footnoteMap[r.fnNum]){footnoteMap[r.fnNum]=`Nota ${r.fnNum}. [Referência não localizada]`;return wFootnoteRef(r.fnNum);}}const rpr=[r.bold?`<w:b/><w:bCs/>`:"",r.italic?`<w:i/><w:iCs/>`:"",r.sup?`<w:vertAlign w:val="superscript"/>`:"",(r.b?`<w:b/><w:bCs/>`:""),FONT,`<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/>`].join("");return`<w:r><w:rPr>${rpr}</w:rPr><w:t xml:space="preserve">${ex(r.text||r.t||"")}</w:t></w:r>`;}).join("");return`<w:p>${ppr}${runs}</w:p>`;}
const wPFN=wParaWithFn;

// ── Motor principal gerarDocx (v1) ────────────────────────────────
async function gerarDocx(rawText,nomeLivro,projetoObj){
  const proj=projetoObj||{nome:nomeLivro||"",area:"",autores:"",capsOk:[],capsProx:[]};
  const lines=rawText.replace(/\[Fonte:[^\]]+\]/g,"").split("\n");
  const noteSecIdx=lines.findIndex(l=>/^②?\s*(NOTAS?\s*DE\s*RODAP)/i.test(l.trim().replace(/\*\*/g,"")));
  const refSecIdx=lines.findIndex(l=>/^(③ REFERÊNCIAS|REFERÊNCIAS BIBLIOGRÁFICAS)/i.test(l.trim()));
  const firstSep=Math.min(...[noteSecIdx,refSecIdx].filter(x=>x>-1).concat([lines.length]));
  const bodyLines=lines.slice(0,firstSep);
  const footnoteMap={};
  const tryCollect=(slice)=>{for(const ln of slice){const raw=ln.trim();if(!raw)continue;const p=parseNoteNum(raw);if(p&&p.text.length>10)footnoteMap[p.num]=p.text;}};
  if(noteSecIdx>-1){const end=refSecIdx>noteSecIdx?refSecIdx:lines.length;tryCollect(lines.slice(noteSecIdx+1,end));}
  if(Object.keys(footnoteMap).length===0)tryCollect(lines.filter(l=>{const r=l.trim();return(SUP_CHARS.includes(r[0])||/^\d{1,2}[.\)]\s/.test(r))&&r.length<400;}));
  if(Object.keys(footnoteMap).length===0)tryCollect(lines.slice(-80));
  const RECUO=709,BODY=12,NOTE=9,SEC=12,CAP_T=14,CAP_N=12,EMENTA=10,LINE_B=276,LINE_S=240;
  const paras=[];
  const allCaps=[...proj.capsOk.map((c,i)=>({num:i+1,label:c,ok:true})),...proj.capsProx.map(c=>({num:c.num,label:`Cap. ${c.num} — ${c.titulo}`,ok:false}))];
  if(proj.nome){
    paras.push(emptyP(),emptyP(),emptyP());
    paras.push(wPara([{text:proj.area||"Obra Jurídica",bold:false,italic:true,sup:false}],{center:true,sizePt:11,spaceBefore:0,spaceAfter:60,lineVal:LINE_S}));
    paras.push(wPara([{text:proj.nome,bold:true,italic:false,sup:false}],{center:true,sizePt:22,spaceBefore:60,spaceAfter:160,lineVal:280}));
    if(proj.autores)paras.push(wPara([{text:proj.autores,bold:false,italic:false,sup:false}],{center:true,sizePt:11,spaceBefore:0,spaceAfter:40,lineVal:LINE_S}));
    paras.push(emptyP(),emptyP());
    paras.push(wPara([{text:"",bold:false,italic:false,sup:false}],{center:true,sizePt:10,spaceBefore:40,spaceAfter:40,border:true}));
    paras.push(emptyP());
    if(allCaps.length>0){
      paras.push(wPara([{text:"SUMÁRIO",bold:true,italic:false,sup:false}],{center:true,sizePt:14,spaceBefore:80,spaceAfter:200,lineVal:LINE_S}));
      for(const c of allCaps){const label=typeof c.label==="string"?c.label:`Cap. ${c.num}`;paras.push(wPara([{text:(c.ok?"✓ ":"")+label,bold:false,italic:false,sup:false}],{align:"left",sizePt:11,spaceBefore:60,spaceAfter:40,lineVal:LINE_S,indent:0}));}
      paras.push(emptyP());
      paras.push(`<w:p><w:pPr><w:pageBreakBefore/></w:pPr></w:p>`);
    }
  }else{paras.push(emptyP());}
  for(const line of bodyLines){
    const raw=line.trim();
    if(!raw){paras.push(emptyP());continue;}
    if(/^-{3,}$/.test(raw)){paras.push(`<w:p><w:pPr><w:jc w:val="both"/><w:pBdr><w:bottom w:val="single" w:sz="4" w:space="4" w:color="000000"/></w:pBdr><w:spacing w:before="120" w:after="120"/></w:pPr></w:p>`);continue;}
    if(/^Cap[íi]tulo\s+[IVXLCDM\d]+$/i.test(raw)){paras.push(wPara([{text:raw,bold:false,italic:false,sup:false}],{center:true,sizePt:CAP_N,spaceBefore:0,spaceAfter:120,lineVal:LINE_S}));continue;}
    if(raw===raw.toUpperCase()&&/[A-ZÁÉÍÓÚ]{4,}/.test(raw)&&raw.length>4&&!/^\d/.test(raw)&&!/^[①②③④⑤⑥⑦⑧]/.test(raw)&&!raw.startsWith("EMENTA_CAP")){paras.push(wPara([{text:raw,bold:true,italic:false,sup:false}],{center:true,sizePt:CAP_T,spaceBefore:0,spaceAfter:360,lineVal:LINE_S}));continue;}
    if(/^EMENTA_CAP:/i.test(raw)){const txt=raw.replace(/^EMENTA_CAP:\s*/i,"");paras.push(wPara([{text:txt,bold:false,italic:true,sup:false}],{center:false,align:"both",sizePt:EMENTA,spaceBefore:0,spaceAfter:0,lineVal:LINE_S,indentLeft:1440,indentRight:1440}));continue;}
    if(/^\*\*[^*]+\*\*$/.test(raw)){const txt=raw.replace(/\*\*/g,"");paras.push(wPara([{text:txt,bold:true,italic:false,sup:false}],{align:"left",sizePt:SEC,spaceBefore:420,spaceAfter:180,lineVal:LINE_B}));continue;}
    if(/^\d+\.\d+(\.\d+)?\s+\S/.test(raw)){const txt=raw.replace(/^\d+\.\d+(\.\d+)?\s+/,"");paras.push(wPara([{text:txt,bold:true,italic:false,sup:false}],{align:"left",sizePt:SEC,spaceBefore:420,spaceAfter:180,lineVal:LINE_B}));continue;}
    if(/^#{1,3}\s/.test(raw)){const txt=raw.replace(/^#+\s/,"");paras.push(wPara([{text:txt,bold:true,italic:false,sup:false}],{align:"left",sizePt:SEC,spaceBefore:420,spaceAfter:180,lineVal:LINE_B}));continue;}
    if(/^>\s*/.test(raw)){paras.push(wParaWithFn(raw.replace(/^>\s*/,""),{align:"both",sizePt:NOTE,spaceBefore:120,spaceAfter:120,lineVal:LINE_S,indentLeft:709,indentRight:709},footnoteMap));continue;}
    const rawClean=raw.replace(/\*\*/g,"").replace(/^#+\s*/,"").trim();
    if(/^[①②③④⑤⑥⑦⑧]/.test(rawClean))continue;
    if(/^(NOTAS?\s*DE\s*RODAP|REFERÊNCIAS|AVALIAÇÃO\s*TÉCNICA)/i.test(rawClean))continue;
    if((SUP_CHARS.includes(raw[0])||/^\d{1,2}[.\)]\s/.test(raw))&&raw.length<400){const p=parseNoteNum(raw);if(p&&p.text.length>10)continue;}
    paras.push(wParaWithFn(raw,{align:"both",sizePt:BODY,indent:RECUO,spaceBefore:0,spaceAfter:60,lineVal:LINE_B},footnoteMap));
  }
  const capLine=bodyLines.find(l=>/^CAPÍTULO\s+\d+/i.test(l.trim()))||"";
  const titLine=bodyLines.find((l,i)=>i>0&&l.trim()&&l.trim()===l.trim().toUpperCase()&&/[A-ZÁÉÍÓÚ]{4,}/.test(l.trim()))||"";

// ── Análise prévia de texto ───────────────────────────────────────
function analisarTexto(rawText){
  const lines=rawText.split("\n");
  let secoes=0,paragrafos=0,notasEncontradas=0,capituloDetectado="";
  const titulos=[];
  const noteSecIdx=lines.findIndex(l=>/^②?\s*(NOTAS?\s*DE\s*RODAP)/i.test(l.trim().replace(/\*\*/g,"")));
  const bodyLines=noteSecIdx>-1?lines.slice(0,noteSecIdx):lines;
  for(const line of bodyLines){
    const raw=line.trim();if(!raw)continue;
    if(/^Cap[íi]tulo\s+[IVXLCDM\d]+$/i.test(raw))capituloDetectado=raw;
    else if(raw===raw.toUpperCase()&&/[A-ZÁÉÍÓÚ]{4,}/.test(raw)&&raw.length>4&&!/^\d/.test(raw))titulos.push(raw.slice(0,55));
    else if(/^\*\*[^*]+\*\*$/.test(raw)||/^#{1,3}\s/.test(raw))secoes++;
    else if(raw.length>40&&!/^[①②③④⑤⑥⑦⑧]/.test(raw))paragrafos++;
  }
  if(noteSecIdx>-1){for(const ln of lines.slice(noteSecIdx+1)){const r=ln.trim();if(!r)continue;const p=parseNoteNum(r);if(p)notasEncontradas++;}}
  else{for(const ln of lines){const r=ln.trim();if((SUP_CHARS.includes(r[0])||/^\d{1,2}[.\)]\s/.test(r))&&r.length<400){const p=parseNoteNum(r);if(p&&p.text.length>10)notasEncontradas++;}}}
  const palavras=rawText.split(/\s+/).filter(Boolean).length;
  return{capituloDetectado,titulos,secoes,paragrafos,notasEncontradas,palavras,linhas:lines.length};
}

// ── RichText ──────────────────────────────────────────────────────
function RichText({content}){
  return <div style={{lineHeight:1.75,fontSize:13}}>
    {(content||'').split('\n').map((line,i)=>{
      if(!line.trim())return <div key={i} style={{height:8}}/>;
      const parts=[];const re=/(\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/g;let last=0,m;
      while((m=re.exec(line))!==null){
        if(m.index>last)parts.push(<span key={last}>{line.slice(last,m.index)}</span>);
        const tok=m[0];
        if(tok.startsWith('**'))parts.push(<strong key={m.index}>{tok.slice(2,-2)}</strong>);
        else if(tok.startsWith('*'))parts.push(<em key={m.index}>{tok.slice(1,-1)}</em>);
        else parts.push(<code key={m.index} style={{background:'rgba(0,0,0,.07)',padding:'1px 5px',borderRadius:3,fontFamily:'monospace',fontSize:11}}>{tok.slice(1,-1)}</code>);
        last=m.index+tok.length;
      }
      if(last<line.length)parts.push(<span key={last}>{line.slice(last)}</span>);
      return <div key={i}>{parts}</div>;
    })}
  </div>;
}

// ── KEY SETUP ─────────────────────────────────────────────────────
function KeySetup({onSave}){
  const[k,setK]=useState('');const[err,setErr]=useState('');const[loading,setLoading]=useState(false);
  const test=async()=>{
    if(!k.trim()){setErr('Cole sua chave API.');return;}
    setLoading(true);setErr('');
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k.trim(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:5,messages:[{role:'user',content:'ok'}]})});
      if(r.status===200||r.status===400){saveKey(k.trim());onSave();}
      else if(r.status===401){setErr('Chave inválida. Verifique em console.anthropic.com');}
      else{saveKey(k.trim());onSave();}
    }catch(e){setErr('Erro de conexão. Verifique sua internet.');}
    setLoading(false);
  };
  return(
    <div style={{minHeight:'100vh',background:'#12192e',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'white',borderRadius:12,padding:40,maxWidth:480,width:'100%',boxShadow:'0 40px 100px rgba(0,0,0,.5)'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:36,marginBottom:8}}>⚖️</div>
          <div style={{fontSize:22,fontWeight:700,color:'#12192e',marginBottom:6}}>JurEdit</div>
          <div style={{fontSize:13,color:'#555',lineHeight:1.7}}>Ecossistema Jurídico Inteligente<br/>Configure sua chave API para começar</div>
        </div>
        <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:8,padding:'12px 16px',marginBottom:20,fontSize:12,color:'#1e40af',lineHeight:1.7}}>
          <strong>Como obter sua chave gratuita:</strong><br/>
          1. Acesse <a href="https://console.anthropic.com" target="_blank" style={{color:'#1d4ed8'}}>console.anthropic.com</a><br/>
          2. Crie uma conta (gratuita)<br/>
          3. Clique em <strong>API Keys → Create Key</strong><br/>
          4. Cole abaixo — fica salvo só no seu navegador
        </div>
        <label style={{fontSize:11,fontWeight:700,display:'block',marginBottom:6,color:'#333',textTransform:'uppercase',letterSpacing:'.06em'}}>Chave API Anthropic</label>
        <input value={k} onChange={e=>setK(e.target.value)} placeholder="sk-ant-..." type="password"
          style={{width:'100%',padding:'10px 14px',border:'1px solid #ddd9d0',borderRadius:6,fontFamily:'monospace',fontSize:13,outline:'none',marginBottom:10}}
          onFocus={e=>e.target.style.borderColor='#7c3aed'} onBlur={e=>e.target.style.borderColor='#ddd9d0'}/>
        {err&&<div style={{padding:'8px 12px',background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:4,fontSize:12,color:'#991b1b',marginBottom:10,fontFamily:'monospace'}}>{err}</div>}
        <button onClick={test} disabled={loading||!k.trim()}
          style={{width:'100%',padding:'12px',background:loading||!k.trim()?'#aaa':'#12192e',color:'white',border:'none',borderRadius:6,cursor:loading||!k.trim()?'not-allowed':'pointer',fontSize:14,fontFamily:'Georgia,serif',fontWeight:700,transition:'background .2s'}}>
          {loading?'⏳ Verificando...':'✓ Salvar e Entrar'}
        </button>
        <div style={{marginTop:12,fontSize:11,color:'#999',textAlign:'center',lineHeight:1.6}}>
          A chave fica salva somente no seu navegador — nunca enviada a terceiros
        </div>
      </div>
    </div>
  );
}

// ── CHAT TOOL (reusável por obra, peça, financeiro) ───────────────
function ChatTool({tool}){
  const[msgs,setMsgs]=useState([]);
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(false);
  const[exportSt,setExportSt]=useState('idle');
  const[doc,setDoc]=useState(null);
  const[showUpload,setShowUpload]=useState(false);
  const[uploadErr,setUploadErr]=useState('');
  const bottomRef=useRef(null);
  const taRef=useRef(null);
  const fileRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,loading]);
  useEffect(()=>{if(taRef.current){taRef.current.style.height='auto';taRef.current.style.height=Math.min(taRef.current.scrollHeight,160)+'px';}},[input]);

  const handleFile=async(file)=>{
    if(!file)return;
    if(file.size>30*1024*1024){setUploadErr('Arquivo muito grande (máx. 30MB).');return;}
    setUploadErr('');
    const ext=file.name.split('.').pop().toLowerCase();
    if(ext==='pdf'){
      const r=new FileReader();r.onload=e=>{setDoc({tipo:'pdf',base64:e.target.result.split(',')[1],nome:file.name});setShowUpload(false);};r.readAsDataURL(file);
    }else if(['docx','doc'].includes(ext)){
      const r=new FileReader();r.onload=async e=>{
        try{const x=await mammoth.extractRawText({arrayBuffer:e.target.result});setDoc({tipo:'docx',texto:x.value,nome:file.name});setShowUpload(false);}
        catch{setUploadErr('Erro ao ler o DOCX.');}
      };r.readAsArrayBuffer(file);
    }else setUploadErr('Use PDF ou DOCX.');
  };

  const enviar=useCallback(async(texto)=>{
    const prompt=texto||input.trim();
    if(!prompt&&!doc)return;
    if(loading)return;
    setInput('');
    let apiContent=prompt;
    if(doc){
      const instrucao=prompt||`Analise este documento conforme sua especialidade.`;
      if(doc.tipo==='pdf')apiContent=[{type:'document',source:{type:'base64',media_type:'application/pdf',data:doc.base64}},{type:'text',text:instrucao}];
      else apiContent=[{type:'text',text:`DOCUMENTO (${doc.nome}):\n\n${doc.texto.slice(0,30000)}\n\n---\n\n${instrucao}`}];
    }
    const novasMsgs=[...msgs,{role:'user',content:typeof apiContent==='string'?apiContent:prompt,docNome:doc?.nome,_api:apiContent}];
    setMsgs(novasMsgs);setLoading(true);
    try{
      const data=await callClaude({model:'claude-sonnet-4-20250514',max_tokens:8000,system:tool.system||'Você é um assistente jurídico especializado.',messages:novasMsgs.map(m=>({role:m.role,content:m._api||m.content}))});
      const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
      setMsgs(prev=>[...prev,{role:'assistant',content:txt||'Sem resposta.'}]);
      setDoc(null);
    }catch(e){
      setMsgs(prev=>[...prev,{role:'assistant',content:`❌ Erro: ${e.message}`}]);
    }
    setLoading(false);
  },[msgs,input,loading,tool,doc]);

  const exportDocx=async()=>{
    const conteudo=msgs.filter(m=>m.role==='assistant').map(m=>m.content).join('\n\n');
    if(!conteudo.trim())return;
    setExportSt('loading');
    setTimeout(()=>{
      try{
        const lines=conteudo.split('\n');const noteIdx=lines.findIndex(l=>/^②?\s*NOTAS?\s*DE\s*RODAP/i.test(l.trim()));
        const bodyLines=noteIdx>-1?lines.slice(0,noteIdx):lines;const fm={};
        const paras=[eP(),eP()];
        paras.push(wP([{t:tool.label,b:false,i:true,sup:false}],{c:true,pt:10,sa:40,lv:240}));
        paras.push(wP([{t:tool.label,b:true,i:false,sup:false}],{c:true,pt:16,sb:40,sa:120,lv:280}));
        paras.push(eP());
        for(const line of bodyLines){
          const raw=line.trim();if(!raw){paras.push(eP());continue;}
          if(/^-{3,}$/.test(raw)){paras.push(`<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="4" w:space="4" w:color="000000"/></w:pBdr><w:spacing w:before="120" w:after="120"/></w:pPr></w:p>`);continue;}
          if(raw===raw.toUpperCase()&&/[A-ZÁÉÍÓÚ]{4,}/.test(raw)&&raw.length>4&&raw.length<120&&!/^\d/.test(raw)&&!/^[①②③④⑤]/.test(raw)){paras.push(wP([{t:raw,b:true,i:false,sup:false}],{c:true,pt:14,sa:300,lv:240}));continue;}
          if(/^EMENTA_CAP:/i.test(raw)){paras.push(wP([{t:raw.replace(/^EMENTA_CAP:\s*/i,''),b:false,i:true,sup:false}],{a:'both',pt:10,sa:0,lv:240,il:1440,ir:1440}));continue;}
          if(/^\*\*[^*]+\*\*$/.test(raw)){paras.push(wP([{t:raw.replace(/\*\*/g,''),b:true,i:false,sup:false}],{a:'left',pt:12,sb:300,sa:100,lv:276}));continue;}
          if(/^>\s*/.test(raw)){paras.push(wPFN(raw.replace(/^>\s*/,''),{a:'both',pt:9,sb:80,sa:80,lv:240,il:709,ir:709},fm));continue;}
          const rc=raw.replace(/\*\*/g,'').trim();if(/^[①②③④⑤]/.test(rc)||/^NOTAS?\s*DE\s*RODAP/i.test(rc))continue;
          if((SC.includes(raw[0])||/^\d{1,2}[.\)]\s/.test(raw))&&raw.length<400){const p=pNN(raw);if(p&&p.text.length>10)continue;}
          paras.push(wPFN(raw,{a:'both',pt:12,in:709,sb:0,sa:60,lv:276},fm));
        }
        const fnE=Object.entries(fm).sort((a,b)=>Number(a[0])-Number(b[0]));
        const slug=tool.label.replace(/[^a-zA-Z0-9]/g,'_').slice(0,20);
        docxDownload(paras,tool.label,fnE,slug+'_'+new Date().toISOString().slice(0,10)+'.docx');
        setExportSt('done');setTimeout(()=>setExportSt('idle'),5000);
      }catch(e){console.error(e);setExportSt('error');setTimeout(()=>setExportSt('idle'),3000);}
    },50);
  };

  const hasContent=msgs.some(m=>m.role==='assistant');
  const C={bg:'#f5f4f1',white:'white',nav:'#12192e',gold:'#c49a2a',border:'#ddd9d0',textPri:'#111',textSec:'#555',textTer:'#999'};

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg,overflow:'hidden'}}>
      {/* Top */}
      <div style={{background:C.nav,padding:'0 18px',display:'flex',alignItems:'center',gap:10,height:48,flexShrink:0}}>
        <span style={{color:C.gold,fontFamily:'monospace',fontWeight:700,fontSize:13,letterSpacing:'.1em'}}>{tool.label.toUpperCase()}</span>
        <span style={{background:`${C.gold}25`,border:`1px solid ${C.gold}55`,color:C.gold,fontSize:9,padding:'2px 8px',borderRadius:2,fontFamily:'monospace'}}>{tool.desc}</span>
        <div style={{marginLeft:'auto',display:'flex',gap:8}}>
          {hasContent&&<button onClick={exportDocx} disabled={exportSt==='loading'} style={{padding:'5px 14px',background:exportSt==='done'?'#166534':tool.cor,color:'white',border:'none',borderRadius:3,fontSize:11,fontFamily:'monospace',cursor:'pointer'}}>{exportSt==='loading'?'⏳...':exportSt==='done'?'✅ gerado!':'⬇ .docx'}</button>}
          {msgs.length>0&&<button onClick={()=>{if(confirm('Limpar conversa?'))setMsgs([]);setDoc(null);}} style={{padding:'5px 10px',background:'transparent',color:'rgba(255,255,255,.3)',border:'1px solid rgba(255,255,255,.1)',borderRadius:3,fontSize:10,fontFamily:'monospace',cursor:'pointer'}}>limpar</button>}
        </div>
      </div>
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {/* Sidebar */}
        {tool.acoes&&(
          <div style={{width:220,background:C.white,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
            <div style={{flex:1,overflowY:'auto',padding:'10px 12px'}}>
              <div style={{fontSize:9,fontFamily:'monospace',color:C.textTer,textTransform:'uppercase',letterSpacing:'.07em',marginBottom:8,marginTop:4}}>Ações rápidas</div>
              {tool.acoes.map((a,i)=>(
                <button key={i} onClick={()=>enviar(a.p)} style={{display:'flex',alignItems:'flex-start',gap:7,width:'100%',padding:'7px 9px',marginBottom:4,border:`1px solid ${C.border}`,borderRadius:4,cursor:'pointer',textAlign:'left',background:'transparent',color:C.textSec,fontSize:11,fontFamily:'Georgia,serif',lineHeight:1.4,transition:'all .12s'}}
                  onMouseOver={e=>{e.currentTarget.style.background=`${tool.cor}10`;e.currentTarget.style.color=C.textPri;}}
                  onMouseOut={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color=C.textSec;}}>
                  <span style={{flexShrink:0}}>{a.ic}</span><span>{a.l}</span>
                </button>
              ))}
              <div style={{marginTop:10,fontSize:9,fontFamily:'monospace',color:C.textTer,textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>Documento (PDF/DOCX)</div>
              <button onClick={()=>setShowUpload(v=>!v)} style={{width:'100%',padding:'8px',border:`1px solid ${doc?tool.cor:C.border}`,borderRadius:4,cursor:'pointer',background:doc?`${tool.cor}10`:'transparent',color:doc?tool.cor:C.textSec,fontSize:11,fontFamily:'monospace',display:'flex',alignItems:'center',gap:6}}>
                📎 {doc?doc.nome.slice(0,18)+'...':'Carregar arquivo'}
              </button>
              {doc&&<button onClick={()=>setDoc(null)} style={{width:'100%',marginTop:4,padding:'4px',border:'1px solid #fca5a5',borderRadius:4,cursor:'pointer',background:'transparent',color:'#991b1b',fontSize:10,fontFamily:'monospace'}}>× Remover documento</button>}
            </div>
          </div>
        )}
        {/* Chat */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {showUpload&&(
            <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:'12px 18px',flexShrink:0}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{fontSize:12,fontWeight:500}}>Carregar PDF ou DOCX</span><button onClick={()=>setShowUpload(false)} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:C.textTer}}>×</button></div>
              <div onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}} onDragOver={e=>e.preventDefault()} onClick={()=>fileRef.current?.click()} style={{border:`2px dashed ${C.border}`,borderRadius:8,padding:'16px',textAlign:'center',cursor:'pointer',background:'#faf8f4'}}>
                <div style={{fontSize:24,marginBottom:4}}>📄</div><div style={{fontSize:12,color:C.textSec}}>Arraste ou clique · PDF ou DOCX · máx. 30MB</div>
              </div>
              <input ref={fileRef} type="file" accept=".pdf,.docx,.doc" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
              {uploadErr&&<div style={{marginTop:6,fontSize:11,color:'#991b1b',fontFamily:'monospace'}}>❌ {uploadErr}</div>}
            </div>
          )}
          <div style={{flex:1,overflowY:'auto',padding:'20px 24px'}}>
            {msgs.length===0&&(
              <div style={{maxWidth:520,margin:'40px auto 0',textAlign:'center'}}>
                <div style={{fontSize:38,marginBottom:10}}>{tool.icon}</div>
                <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>{tool.label}</div>
                <div style={{fontSize:13,color:C.textSec,lineHeight:1.7,marginBottom:16}}>{tool.desc}</div>
                {tool.acoes&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,textAlign:'left'}}>
                  {tool.acoes.slice(0,4).map((a,i)=>(
                    <button key={i} onClick={()=>enviar(a.p)} style={{padding:'10px 12px',border:`1px solid ${C.border}`,borderRadius:6,cursor:'pointer',background:C.white,textAlign:'left',fontSize:12,color:C.textSec,fontFamily:'Georgia,serif',lineHeight:1.4}} onMouseOver={e=>e.currentTarget.style.borderColor=tool.cor} onMouseOut={e=>e.currentTarget.style.borderColor=C.border}>{a.ic} {a.l}</button>
                  ))}
                </div>}
              </div>
            )}
            {msgs.map((m,i)=>(
              <div key={i} style={{marginBottom:20,display:'flex',gap:12,justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
                {m.role==='assistant'&&<div style={{width:28,height:28,background:tool.cor,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0,marginTop:2}}>{tool.icon}</div>}
                <div style={{maxWidth:'82%'}}>
                  {m.docNome&&<div style={{display:'flex',marginBottom:4,justifyContent:'flex-end'}}><span style={{fontSize:10,fontFamily:'monospace',padding:'2px 8px',background:`${tool.cor}15`,border:`1px solid ${tool.cor}30`,borderRadius:10,color:tool.cor}}>📄 {m.docNome.slice(0,20)}</span></div>}
                  <div style={{padding:'12px 16px',borderRadius:m.role==='user'?'16px 4px 16px 16px':'4px 16px 16px 16px',background:m.role==='user'?C.nav:C.white,color:m.role==='user'?'white':C.textPri,border:m.role==='assistant'?`1px solid ${C.border}`:'none',fontSize:13,lineHeight:1.75}}>
                    {m.role==='assistant'?<RichText content={m.content}/>:<span style={{fontFamily:'Georgia,serif',fontSize:13}}>{m.content}</span>}
                  </div>
                </div>
              </div>
            ))}

    if(!exportTexto.trim())return;
    setExportSt('loading');
    setTimeout(()=>{
      try{
        const lines=exportTexto.split('\n');const noteIdx=lines.findIndex(l=>/^②?\s*NOTAS?\s*DE\s*RODAP/i.test(l.trim()));
        const bodyLines=noteIdx>-1?lines.slice(0,noteIdx):lines;const fm={};

        if(proj.autores)paras.push(wP([{t:proj.autores,b:false,i:false,sup:false}],{c:true,pt:11,sa:40,lv:240}));

        const allCaps=[...proj.capsOk.map(c=>({label:c,ok:true})),...proj.capsProx.map(c=>({label:`Cap. ${c.num} — ${c.titulo}`,ok:false}))];

          paras.push(wP([{t:'SUMÁRIO',b:true,i:false,sup:false}],{c:true,pt:14,sb:80,sa:200,lv:240}));

          paras.push(eP(),`<w:p><w:pPr><w:pageBreakBefore/></w:pPr></w:p>`);
        }
        for(const line of bodyLines){
          const raw=line.trim();if(!raw){paras.push(eP());continue;}

  const[busca,setBusca]=useState('');const[iaResult,setIaResult]=useState('');const[loading,setLoading]=useState(false);const[err,setErr]=useState('');

const DEMO_DOCX=`Capítulo I

A JURISDIÇÃO E SEUS FUNDAMENTOS

EMENTA_CAP: Funções básicas do Estado: legislação, administração e jurisdição. Conceito e natureza jurídica da jurisdição. Princípios informativos. Equivalentes jurisdicionais.

---

**Conceito e natureza jurídica**

A jurisdição constitui uma das funções essenciais do Estado moderno, ao lado da legislação e da administração. CHIOVENDA¹, em sua clássica obra *Principii di Diritto Processuale Civile*, sustenta que a jurisdição consiste na atuação da vontade concreta da lei, mediante substituição da atividade dos particulares pela atividade de órgãos públicos.

Nesse diapasão, cumpre observar que a jurisdição não se confunde com a administração, muito embora ambas se expressem como atividades do Estado. Com efeito, enquanto a administração prossegue finalidades públicas em nome próprio, a jurisdição atua em posição de terceiro imparcial, substituindo a vontade das partes.²

**Princípios informativos**

Os princípios que informam a atividade jurisdicional são de ordem lógica, jurídica, política e econômica. O princípio da inércia (ne procedat iudex ex officio) é corolário natural da imparcialidade: o Estado-juiz não pode mover-se de ofício, aguardando a provocação do interessado.³

> EMENTA — STF, RE 848.826/DF, Rel. Min. Roberto Barroso, Plenário, j. 10.08.2016: "A jurisdição constitucional pressupõe a inércia como vetor de imparcialidade estrutural do Poder Judiciário."

Síntese do Capítulo

O percurso deste capítulo permite enunciar três conclusões estruturantes. Primeira, a jurisdição é função estatal exercida por terceiro imparcial, que substitui a vontade das partes na composição dos conflitos. Segunda, distingue-se da administração pela nota da substitutividade e da definitividade.

② NOTAS DE RODAPÉ
¹ Giuseppe Chiovenda, *Principii di Diritto Processuale Civile*, 3. ed., Napoli, Jovene, 1923, p. 43.
² Cândido Rangel Dinamarco, *Instituições de Direito Processual Civil*, v. I, 9. ed., São Paulo, Malheiros, 2023, p. 317.
³ Fredie Didier Jr., *Curso de Direito Processual Civil*, v. I, 25. ed., Salvador, JusPodivm, 2024, p. 189.`;

        {/* Editor + Diagnóstico */}
        <div style={{background:'white',border:`1px solid ${C.border}`,borderRadius:6,marginBottom:14,overflow:'hidden'}}>
          <div style={{display:'flex',borderBottom:`1px solid ${C.border}`,background:'#f0ebe0'}}>
            {[['texto','Texto'],['diag','Diagnóstico']].map(([id,label])=>(
              <button key={id} onClick={()=>setTab(id)} style={{padding:'9px 20px',fontSize:10,fontFamily:'monospace',letterSpacing:'.06em',textTransform:'uppercase',border:'none',background:tab===id?'white':'transparent',cursor:'pointer',color:tab===id?C.navy:C.textTer,fontWeight:tab===id?700:400,borderBottom:tab===id?`2px solid ${C.gold}`:'2px solid transparent',marginBottom:-1,transition:'all .15s'}}>{label}{id==='diag'&&analise?` (${analise.palavras.toLocaleString('pt-BR')} pal.)`:''}</button>
            ))}
          </div>

          {tab==='texto'&&(
            <div style={{padding:'16px 18px'}}>
              <label style={{fontSize:10,fontFamily:'monospace',color:C.textTer,display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em'}}>Conteúdo do capítulo — markdown jurídico</label>
              <textarea value={texto} onChange={e=>setTexto(e.target.value)}
                style={{width:'100%',minHeight:300,padding:'12px 14px',border:`1px solid ${C.border}`,borderRadius:4,fontFamily:'Georgia,serif',fontSize:13,color:C.textPri,background:'#faf7f0',outline:'none',resize:'vertical',lineHeight:1.75,boxSizing:'border-box'}}
                placeholder={'Cole o texto gerado pelo JurObra ou JurPeça...\n\nSuportes:\n  Capítulo I\n  TÍTULO EM CAIXA ALTA\n  EMENTA_CAP: resumo\n  **Seção em negrito**\n  Parágrafo com nota¹\n  > Citação jurisprudencial\n  --- separador\n  ② NOTAS DE RODAPÉ\n  ¹ Autor, Obra, editora, ano, p. XX.'}
              />
              <div style={{marginTop:6,fontSize:10,color:C.textTer,fontFamily:'monospace'}}>
                Capítulo · TÍTULO · EMENTA_CAP · **seção** · parágrafo · &gt; citação · ¹²³ notas · ② NOTAS DE RODAPÉ
              </div>
            </div>
          )}

          {tab==='diag'&&(
            <div style={{padding:'16px 18px'}}>
              {!analise?(
                <div style={{textAlign:'center',padding:'40px 0',color:C.textTer,fontSize:13}}>Cole ou carregue um texto para ver o diagnóstico</div>
              ):(
                <>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:16}}>
                    {[[analise.palavras.toLocaleString('pt-BR'),'palavras'],[analise.paragrafos,'parágrafos'],[analise.secoes,'seções'],[analise.notasEncontradas,'notas rodapé']].map(([n,l],i)=>(
                      <div key={i} style={{background:'#f0ebe0',borderRadius:4,padding:'12px 0',textAlign:'center',border:`1px solid ${C.border}`}}>
                        <div style={{fontSize:22,fontWeight:700,color:C.navy,lineHeight:1}}>{n}</div>
                        <div style={{fontSize:10,fontFamily:'monospace',color:C.textTer,marginTop:4,letterSpacing:'.04em'}}>{l}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:12,lineHeight:1.8,color:C.textSec}}>
                    {analise.capituloDetectado&&<div style={{marginBottom:6}}><span style={{fontFamily:'monospace',color:C.textTer}}>capítulo: </span><strong>{analise.capituloDetectado}</strong></div>}
                    {analise.titulos.length>0&&(
                      <div style={{marginBottom:6}}>
                        <span style={{fontFamily:'monospace',color:C.textTer}}>títulos CAIXA ALTA: </span>
                        {analise.titulos.map((t,i)=><span key={i} style={{display:'inline-block',background:'#f0ebe0',border:`1px solid ${C.border}`,borderRadius:2,padding:'1px 7px',marginRight:5,marginBottom:4,fontSize:10,fontFamily:'monospace'}}>{t}</span>)}
                      </div>
                    )}
                    {analise.notasEncontradas===0&&(
                      <div style={{marginTop:8,padding:'8px 12px',background:'#fffbeb',border:'1px solid #fcd34d',borderRadius:4,fontSize:11,color:'#92400e',fontFamily:'monospace'}}>
                        ⚠ Nenhuma nota de rodapé detectada. Adicione a seção ② NOTAS DE RODAPÉ ao final do texto.
                      </div>
                    )}
                  </div>
                </>
              )}
            </div>
          )}
        </div>

        {/* Ação */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,marginBottom:12}}>
          <div style={{fontSize:11,fontFamily:'monospace',color:C.textTer}}>
            {analise?`${analise.palavras.toLocaleString('pt-BR')} palavras · ${analise.notasEncontradas} notas · pronto para exportar`:'Aguardando texto...'}
          </div>
          <button onClick={gerar} disabled={status==='loading'||!texto.trim()}
            style={{padding:'11px 32px',background:bc.bg,color:bc.txt,border:'none',borderRadius:4,fontSize:13,fontFamily:'Georgia,serif',fontWeight:700,cursor:status==='loading'?'not-allowed':'pointer',transition:'background .2s',letterSpacing:'.02em'}}>
            {{idle:'⬇  Gerar .docx',loading:'⏳  Gerando...',done:'✅  Gerado!',error:'❌  Erro'}[status]}
          </button>
        </div>

        {/* Resultado */}
        {status==='done'&&diag&&(
          <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:4,padding:'12px 16px',marginBottom:12}}>
            <div style={{fontSize:11,fontFamily:'monospace',color:C.green,fontWeight:700,marginBottom:6}}>✅ DOCX GERADO COM SUCESSO</div>
            <div style={{fontSize:12,color:C.green,lineHeight:1.7}}>
              {diag.bodyLines} linhas processadas · <strong>{diag.fnCount} notas de rodapé reais</strong> inseridas no XML Word
            </div>
            {fallback&&<a href={fallback.dataUri} download={fallback.filename} style={{display:'inline-block',marginTop:8,fontSize:11,color:'#0369a1',fontFamily:'monospace'}}>↓ Link manual: {fallback.filename}</a>}
          </div>
        )}
        {status==='error'&&(
          <div style={{background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:4,padding:'12px 16px',marginBottom:12,fontSize:12,color:C.red,fontFamily:'monospace'}}>
            ❌ Erro ao gerar o arquivo. Verifique o console do navegador.
          </div>
        )}

        {/* Rodapé informativo */}
        <div style={{padding:'13px 16px',background:'white',border:`1px solid ${C.border}`,borderRadius:4,fontSize:10,fontFamily:'monospace',color:C.textTer,lineHeight:1.8}}>
          <strong style={{color:C.navy}}>JurDocx Engine v1</strong> — Fase 0 · Motor integrado ao JurEdit v2<br/>
          <span style={{color:C.textTer}}>Recebe:</span> markdown jurídico &nbsp;·&nbsp; <span style={{color:C.textTer}}>Entrega:</span> .docx Times NR 12pt, A4, footnotes XML, cabeçalho/rodapé<br/>
          Consumido por: <span style={{color:C.gold}}>JurObra</span> &nbsp;·&nbsp; <span style={{color:'#5DCAA5'}}>JurPeça</span> &nbsp;·&nbsp; <span style={{color:'#7F77DD'}}>JurArtigo</span>
        </div>

      </div>
    </div>
  );
}

// ── APP SHELL ─────────────────────────────────────────────────────
function App(){
  const[hasKey,setHasKey]=useState(!!getKey());
  const[activeId,setActiveId]=useState('hub');
  const[collapsed,setCollapsed]=useState(false);

  if(!hasKey)return <KeySetup onSave={()=>setHasKey(true)}/>;

  const navItems=[
    {id:'hub',icon:'🏠',label:'JurHub',desc:'Projeto · Bancos · Export',cor:'#c49a2a'},
    {id:'obra',icon:'📚',label:'JurObra',desc:'Livros · Tratados',cor:'#8b1a1a'},
    {id:'peca',icon:'⚖️',label:'JurPeça',desc:'Petição · Parecer',cor:'#7c3aed'},
    {id:'fin',icon:'📑',label:'JurFinanceiro',desc:'Bancário · MC',cor:'#0369a1'},
    {id:'bib',icon:'📖',label:'JurBiblioteca',desc:'Doutrina · ABNT',cor:'#c49a2a'},
    {id:'jur',icon:'🏛️',label:'JurJurisprudência',desc:'STF · STJ · TST',cor:'#0369a1'},
    {id:'docx',icon:'📄',label:'JurDocx Engine',desc:'Gerar .docx · Notas · ZIP',cor:'#166534'},
  ];

  const renderTool=()=>{
    if(activeId==='hub')return <HubTool/>;
    if(activeId==='bib')return <BibTool/>;
    if(activeId==='jur')return <JurTool/>;
    if(activeId==='docx')return <JurDocxEngine/>;
    const tool=TOOLS[activeId];
    if(!tool)return null;
    return <ChatTool key={activeId} tool={tool}/>;
  };

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#f5f4f1'}}>
      {/* Sidebar */}
      <div style={{width:collapsed?52:210,background:'#12192e',display:'flex',flexDirection:'column',flexShrink:0,transition:'width .2s ease',overflow:'hidden',borderRight:'1px solid #0a1020'}}>
        <div style={{padding:collapsed?'14px 0':'14px 16px',display:'flex',alignItems:'center',gap:10,borderBottom:'1px solid rgba(255,255,255,.08)',justifyContent:collapsed?'center':'flex-start'}}>
          {!collapsed&&<><span style={{color:'#c49a2a',fontFamily:'monospace',fontWeight:700,fontSize:13,letterSpacing:'.1em',whiteSpace:'nowrap'}}>JUREDIT</span><span style={{background:'rgba(196,154,42,.2)',border:'1px solid rgba(196,154,42,.4)',color:'#c49a2a',fontSize:8,padding:'1px 6px',borderRadius:2,fontFamily:'monospace',whiteSpace:'nowrap'}}>v2</span></>}
          <button onClick={()=>setCollapsed(v=>!v)} style={{marginLeft:'auto',background:'none',border:'none',color:'rgba(255,255,255,.4)',cursor:'pointer',fontSize:16,padding:'0 4px',lineHeight:1,flexShrink:0}}>{collapsed?'›':'‹'}</button>
        </div>
        <nav style={{flex:1,padding:'8px 6px',overflowY:'auto'}}>
          {navItems.map(t=>{
            const isActive=activeId===t.id;
            return(
              <button key={t.id} onClick={()=>setActiveId(t.id)} title={collapsed?t.label:undefined}
                style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:collapsed?'10px 0':'9px 10px',marginBottom:3,border:'none',borderRadius:6,cursor:'pointer',textAlign:'left',justifyContent:collapsed?'center':'flex-start',background:isActive?`${t.cor}25`:'transparent',borderLeft:isActive&&!collapsed?`3px solid ${t.cor}`:'3px solid transparent',transition:'all .15s'}}>
                <span style={{fontSize:16,flexShrink:0}}>{t.icon}</span>
                {!collapsed&&<div style={{minWidth:0}}><div style={{fontSize:12,fontWeight:isActive?700:400,color:isActive?t.cor:'rgba(255,255,255,.65)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.label}</div><div style={{fontSize:10,color:'rgba(255,255,255,.3)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',fontFamily:'monospace'}}>{t.desc}</div></div>}
              </button>
            );
          })}
        </nav>
        {!collapsed&&(
          <div style={{padding:'8px 12px',borderTop:'1px solid rgba(255,255,255,.06)'}}>
            <button onClick={()=>{if(confirm('Alterar chave API?')){localStorage.removeItem(KEY_STORE);setHasKey(false);}}} style={{width:'100%',padding:'6px',background:'transparent',border:'1px solid rgba(255,255,255,.1)',borderRadius:4,cursor:'pointer',color:'rgba(255,255,255,.3)',fontSize:10,fontFamily:'monospace'}}>🔑 Alterar chave API</button>
          </div>
        )}
      </div>
      {/* Main */}
      <div style={{flex:1,overflow:'hidden'}}>
        {renderTool()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
