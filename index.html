  const bibStr  = bibCache.length > 0 ? bibCache.map((b,i)=>`[BIB-${i+1}] ${b.texto}`).join("\n") : "";

  return `Você é JurObra Excellence v2 — redator jurídico de máximo padrão acadêmico com busca web em tempo real.

PROJETO: "${proj.nome||"Sem título"}"
Área: ${proj.area||"Direito"} | Nível: ${nivel} | Tipo: ${tipo}
Referência de estilo: ${proj.autores||"não definido"}
Capítulos concluídos: ${okStr}
Próximos capítulos: ${proxStr}
${temDoc ? `MODO ANÁLISE DE DOCUMENTO: ativo — leia o documento antes de qualquer resposta. Modo: ${MODOS_DOC[modoDoc]?.label||""}` : ""}
${jurStr ? `\nCITAÇÕES DO BANCO (incorporar quando relevante):\n${jurStr}` : ""}

PADRÃO MANUAL JURÍDICO ACADÊMICO CLÁSSICO:

⓪ CABEÇALHO:
  Capítulo [N]
  TÍTULO EM CAIXA ALTA
  EMENTA_CAP: subtemas separados por ponto.
  ---

① SEÇÕES: **negrito**, alinhado à esquerda, sem numeração arábica
② CORPO: recuo de 1ª linha · parágrafos 6–10 linhas · obras em *itálico*
   Voz impessoal: "cumpre observar", "não se pode olvidar"
   Conectores: "Com efeito,", "Nesse diapasão,", "Destarte,"
③ NOTAS: superscript ¹²³ colado à palavra · mínimo 30 por capítulo

          <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
            <div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:700,display:"block",marginBottom:4}}>Título da obra</label><input value={titulo} onChange={e=>setTitulo(e.target.value)} placeholder="Ex: Títulos de Crédito no Direito Brasileiro" style={{width:"100%",padding:"9px 12px",border:"1px solid #d4cfc6",borderRadius:4,fontFamily:"Georgia,serif",fontSize:13,outline:"none",boxSizing:"border-box"}}/></div>
            <div style={{marginBottom:14}}><label style={{fontSize:11,fontWeight:700,display:"block",marginBottom:4}}>Descrição / objetivo</label><textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={3} placeholder="Escopo, público e abordagem da obra..." style={{width:"100%",padding:"9px 12px",border:"1px solid #d4cfc6",borderRadius:4,fontFamily:"Georgia,serif",fontSize:13,resize:"vertical",outline:"none",boxSizing:"border-box"}}/></div>
            {erro&&<div style={{padding:"8px 12px",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:4,fontSize:12,color:"#991b1b",marginBottom:12}}>{erro}</div>}
            <button onClick={gerar} disabled={loading} style={{width:"100%",padding:"11px",background:loading?"#aaa":"#1a2744",color:"white",border:"none",borderRadius:4,cursor:loading?"not-allowed":"pointer",fontSize:13,fontFamily:"Georgia,serif",fontWeight:700}}>{loading?"⏳ Gerando...":"🗂️ Gerar Sumário com IA"}</button>
          </div>
        ):(
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{flex:1,overflowY:"auto",padding:"16px 24px"}}><div style={{background:"#f7f3ec",border:"1px solid #d4cfc6",borderRadius:4,padding:"14px 16px",fontSize:12,fontFamily:"monospace",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{output}</div></div>
            {erro&&<div style={{padding:"8px 16px",background:"#fef2f2",fontSize:11,color:"#991b1b",fontFamily:"monospace"}}>{erro}</div>}
            <div style={{padding:"12px 24px",background:"#f7f3ec",borderTop:"1px solid #d4cfc6",display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>{setStep("form");setOutput("");setErro("");}} style={{padding:"8px 18px",background:"white",border:"1px solid #d4cfc6",borderRadius:4,cursor:"pointer",fontSize:12}}>← Refazer</button>
              <button onClick={()=>navigator.clipboard?.writeText(output)} style={{padding:"8px 18px",background:"white",border:"1px solid #d4cfc6",borderRadius:4,cursor:"pointer",fontSize:12}}>📋 Copiar</button>
              <button onClick={integrar} style={{padding:"8px 24px",background:"#166534",color:"white",border:"none",borderRadius:4,cursor:"pointer",fontSize:13,fontFamily:"Georgia,serif",fontWeight:700}}>✅ Integrar ao Projeto</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════════
// COMPONENTE PRINCIPAL
// ═══════════════════════════════════════════════════════════════════
function JurObraV2() {
  const [projeto, setProjeto]     = useState(PROJ_DEFAULT);
  const [tipo, setTipo]           = useState(TIPO_OBRA[0].v);
  const [nivel, setNivel]         = useState(NIVEIS[0].v);
  const [msgs, setMsgs]           = useState([]);
  const [input, setInput]         = useState("");
  const [loading, setLoading]     = useState(false);
  const [modal, setModal]         = useState(null);
  const [exportStatus, setExportStatus] = useState("idle");
  const [storageOk, setStorageOk] = useState(false);
  const [sidebarOpen, setSidebarOpen]   = useState(true);
  const [initLoading, setInitLoading]   = useState(true);

  // Bancos do Hub
  const [jurCache, setJurCache]   = useState([]);
  const [bibCache, setBibCache]   = useState([]);
  const [hubSec, setHubSec]       = useState("jur"); // qual seção do banco está aberta

  // Documento carregado
  const [doc, setDoc]             = useState(null);
  const [modoDoc, setModoDoc]     = useState("referencia");
  const [uploadErr, setUploadErr] = useState("");
  const [uploadLoading, setUploadLoading] = useState(false);
  const [showUpload, setShowUpload]       = useState(false);

  // Inserção de item do banco no input
  const [inserido, setInserido]   = useState(null);

  const fileInputRef = useRef(null);
  const bottomRef    = useRef(null);
  const taRef        = useRef(null);

  // Carregar tudo na montagem
  useEffect(() => {
    (async () => {
      const [p, j, b] = await Promise.all([sGet(K_PROJ), sGet(K_JUR), sGet(K_BIB)]);
      if (p) { setProjeto(p); setStorageOk(true); }
      if (j) setJurCache(Array.isArray(j) ? j : []);
      if (b) setBibCache(Array.isArray(b) ? b : []);
      setInitLoading(false);
    })();
  }, []);

  // Refrescar bancos a cada 60s (usuário pode ter adicionado no Hub)
  useEffect(() => {
    const id = setInterval(async () => {
      const [j, b] = await Promise.all([sGet(K_JUR), sGet(K_BIB)]);
      if (j) setJurCache(Array.isArray(j) ? j : []);
      if (b) setBibCache(Array.isArray(b) ? b : []);
    }, 60000);
    return () => clearInterval(id);
  }, []);

  const salvarProjeto = async (p) => {
    setProjeto(p); setModal(null);
    await sSet(K_PROJ, p); setStorageOk(true);
  };

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [msgs, loading]);
  useEffect(() => {
    if (taRef.current) { taRef.current.style.height = "auto"; taRef.current.style.height = Math.min(taRef.current.scrollHeight, 160) + "px"; }
  }, [input]);

  // Inserir item do banco no campo de texto
  const inserirNoBanco = (texto, idx) => {
    setInput(prev => prev ? prev + "\n\n" + texto : texto);
    setInserido(idx); setTimeout(() => setInserido(null), 2000);
    taRef.current?.focus();
  };

  // Upload de documento
  const handleFile = async (file) => {
    if (!file) return;
    if (file.size > 30 * 1024 * 1024) { setUploadErr("Arquivo muito grande (máx. 30MB)."); return; }
    setUploadErr(""); setUploadLoading(true);
    try {
      const d = await lerArquivo(file);
      setDoc({ ...d, modoKey: modoDoc });
      setShowUpload(false);
    } catch(e) { setUploadErr(e.message || "Erro ao ler o arquivo."); }
    setUploadLoading(false);
  };

  const montarContentDoc = (d, instrucaoExtra) => {
    const instrucao = MODOS_DOC[d.modoKey]?.instrucao + (instrucaoExtra ? `\n\nINSTRUÇÃO: ${instrucaoExtra}` : "");
    if (d.tipo === "pdf") {
      return [
        { type:"document", source:{ type:"base64", media_type:"application/pdf", data:d.base64 } },
        { type:"text", text: instrucao },
      ];
    }
    return [{ type:"text", text:`DOCUMENTO (${d.nome}):\n\n${d.texto.slice(0,30000)}\n\n---\n\n${instrucao}` }];
  };

  // Disparar capítulo
  const dispararCapitulo = (cap) => {
    const jurStr = jurCache.length > 0 ? `\nUse as citações do banco: ${jurCache.map(j=>j.texto).join(" | ")}` : "";
    const bibStr = bibCache.length > 0 ? `\nUse as referências do banco: ${bibCache.map(b=>b.texto).join(" | ")}` : "";
    const prompt = `Pesquise jurisprudência e doutrina atualizada e desenvolva o CAPÍTULO ${cap.num} COMPLETO seguindo o padrão manual clássico. Cabeçalho (Capítulo ${cap.num}, TÍTULO EM CAIXA ALTA, EMENTA_CAP), seções em **negrito**, parágrafos com recuo, mínimo 30 notas ¹²³ e ② NOTAS DE RODAPÉ ao final.${jurStr}${bibStr}\n\nCapítulo: ${cap.num}|${cap.titulo}`;
    enviar(prompt);
  };

  // Enviar mensagem
  const enviar = useCallback(async (texto) => {
    const prompt = texto || input.trim();
    if (!prompt && !doc) return;
    if (loading) return;
    setInput("");

    const msgContent = doc
      ? [...montarContentDoc(doc, prompt), ...[] ]
      : prompt;

    const novasMsgs = [...msgs, {
      role:"user",
      content: typeof msgContent === "string" ? msgContent : prompt,
      docContent: doc ? msgContent : null,
      docNome: doc?.nome,
      docModo: doc ? MODOS_DOC[doc.modoKey]?.label : null,
    }];
    setMsgs(novasMsgs); setLoading(true);

    try {
      const apiMsgs = novasMsgs.map(m => ({ role:m.role, content: m.docContent || m.content }));
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{
          "Content-Type":"application/json",
          "x-api-key": getKey(),
          "anthropic-version": "2023-06-01",
          "anthropic-beta": "web-search-2025-03-05",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:8000,
          system: buildSystem(tipo, nivel, projeto, jurCache, bibCache, !!doc, doc?.modoKey),
          messages: apiMsgs,
          tools: [{ type:"web_search_20250305", name:"web_search" }],
        }),
      });
      const data = await resp.json();
      const txt = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
      setMsgs(prev => [...prev, { role:"assistant", content: txt || "Sem resposta." }]);
      setDoc(null);
    } catch(e) {
      setMsgs(prev => [...prev, { role:"assistant", content:"❌ Erro de conexão. Tente novamente." }]);
    } finally { setLoading(false); }
  }, [msgs, input, loading, tipo, nivel, projeto, jurCache, bibCache, doc]);

  const handleExport = async () => {
    const conteudo = msgs.filter(m=>m.role==="assistant").map(m=>m.content).join("\n\n");
    if (!conteudo.trim()) return;
    setExportStatus("loading");
    try { await gerarDocxObra(conteudo, projeto); setExportStatus("done"); setTimeout(()=>setExportStatus("idle"),6000); }
    catch(e) { console.error(e); setExportStatus("error"); setTimeout(()=>setExportStatus("idle"),4000); }
  };

  const C = { bg:"#f5f4f1", white:"white", nav:"#12192e", gold:"#c49a2a", red:"#8b1a1a", border:"#ddd9d0", textPri:"#111", textSec:"#555", textTer:"#999" };
  const hasContent = msgs.some(m=>m.role==="assistant");
  const prog = projeto.capsOk.length;
  const total = projeto.capsOk.length + projeto.capsProx.length;

  if (initLoading) return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:32,marginBottom:10}}>📚</div>
        <div style={{fontSize:13,color:C.textSec,fontFamily:"monospace"}}>carregando projeto e bancos...</div>
      </div>
    </div>
  );

  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:C.bg,fontFamily:"Georgia,serif",color:C.textPri,overflow:"hidden"}}>

      {/* TOP BAR */}
      <div style={{background:C.nav,padding:"0 18px",display:"flex",alignItems:"center",gap:10,height:48,flexShrink:0,borderBottom:"1px solid #0a1020"}}>
        <button onClick={()=>setSidebarOpen(v=>!v)} style={{background:"none",border:"none",color:"rgba(255,255,255,.5)",cursor:"pointer",fontSize:16}}>☰</button>
        <span style={{color:C.gold,fontFamily:"monospace",fontWeight:700,fontSize:13,letterSpacing:".1em"}}>JUROBRA</span>
        <span style={{background:`${C.gold}25`,border:`1px solid ${C.gold}55`,color:C.gold,fontSize:9,padding:"2px 8px",borderRadius:2,fontFamily:"monospace"}}>v2 · Hub + PDF</span>
        <div style={{width:1,height:20,background:"rgba(255,255,255,.1)",margin:"0 4px"}}/>
        {projeto.nome
          ? <span style={{fontSize:12,color:"rgba(255,255,255,.7)",maxWidth:300,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📖 {projeto.nome}</span>
          : <span style={{fontSize:11,color:"rgba(255,255,255,.3)",fontFamily:"monospace",fontStyle:"italic"}}>nenhum projeto</span>}
        {storageOk && <span style={{fontSize:9,color:"#4ade80",fontFamily:"monospace"}}>● salvo</span>}
        {(jurCache.length > 0 || bibCache.length > 0) && (
          <span style={{fontSize:9,color:"#60a5fa",fontFamily:"monospace"}}>
            🔗 Hub: {jurCache.length} cit. · {bibCache.length} ref.
          </span>
        )}
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
          {hasContent && <button onClick={handleExport} disabled={exportStatus==="loading"} style={{padding:"5px 14px",background:exportStatus==="done"?"#166534":C.red,color:"white",border:"none",borderRadius:3,fontSize:11,fontFamily:"monospace",cursor:"pointer",transition:"background .2s"}}>{exportStatus==="loading"?"⏳...":exportStatus==="done"?"✅ gerado!":"⬇ .docx"}</button>}
          <button onClick={()=>setModal("sumario")} style={{padding:"5px 12px",background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(255,255,255,.12)",borderRadius:3,fontSize:10,fontFamily:"monospace",cursor:"pointer"}}>🗂️ Sumário</button>
          <button onClick={()=>setModal("projeto")} style={{padding:"5px 12px",background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.6)",border:"1px solid rgba(255,255,255,.12)",borderRadius:3,fontSize:10,fontFamily:"monospace",cursor:"pointer"}}>⚙️ Projeto</button>
          {msgs.length>0 && <button onClick={()=>{if(window.confirm("Limpar?"))setMsgs([]);}} style={{padding:"5px 10px",background:"transparent",color:"rgba(255,255,255,.25)",border:"1px solid rgba(255,255,255,.08)",borderRadius:3,fontSize:10,fontFamily:"monospace",cursor:"pointer"}}>limpar</button>}
        </div>
      </div>

      <div style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* SIDEBAR */}
        {sidebarOpen && (
          <div style={{width:248,background:C.white,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>

            {/* Tipo e nível */}
            <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`}}>
              <div style={{fontSize:9,fontFamily:"monospace",color:C.textTer,textTransform:"uppercase",letterSpacing:".07em",marginBottom:4}}>Tipo de obra</div>
              <select value={tipo} onChange={e=>setTipo(e.target.value)} style={{width:"100%",padding:"6px 8px",border:`1px solid ${C.border}`,borderRadius:4,fontFamily:"Georgia,serif",fontSize:12,background:C.bg,outline:"none",marginBottom:8}}>
                {TIPO_OBRA.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
              </select>
              <div style={{fontSize:9,fontFamily:"monospace",color:C.textTer,textTransform:"uppercase",letterSpacing:".07em",marginBottom:4}}>Nível</div>
              <select value={nivel} onChange={e=>setNivel(e.target.value)} style={{width:"100%",padding:"6px 8px",border:`1px solid ${C.border}`,borderRadius:4,fontFamily:"Georgia,serif",fontSize:12,background:C.bg,outline:"none"}}>
                {NIVEIS.map(n=><option key={n.v} value={n.v}>{n.l}</option>)}
              </select>
            </div>

            {/* Progresso */}
            {(proj => proj.capsOk.length > 0 || proj.capsProx.length > 0)(projeto) && (
              <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:9,fontFamily:"monospace",color:C.textTer,textTransform:"uppercase",letterSpacing:".07em"}}>Progresso</span>
                  <span style={{fontSize:11,fontWeight:700,color:C.gold,fontFamily:"monospace"}}>{prog}/{total}</span>
                </div>
                <div style={{height:4,background:"#ede8df",borderRadius:2,marginBottom:8,overflow:"hidden"}}>
                  <div style={{height:"100%",background:C.gold,borderRadius:2,width:total>0?`${(prog/total)*100}%`:"0%",transition:"width .4s"}}/>
                </div>
                {projeto.capsOk.map((c,i)=>(
                  <div key={i} style={{fontSize:10,color:"#166534",fontFamily:"monospace",padding:"1px 0",display:"flex",gap:5}}>
                    <span>✓</span><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.slice(0,36)}</span>
                  </div>
                ))}
                {projeto.capsProx.length > 0 && (
                  <div style={{marginTop:6}}>
                    <div style={{fontSize:9,fontFamily:"monospace",color:C.textTer,textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>Gerar agora</div>
                    {projeto.capsProx.map((c,i)=>(
                      <button key={i} onClick={()=>dispararCapitulo(c)}
                        style={{display:"flex",alignItems:"flex-start",gap:6,width:"100%",padding:"6px 8px",marginBottom:3,border:`1px solid ${C.border}`,borderRadius:4,cursor:"pointer",textAlign:"left",background:"transparent",color:C.textSec,fontSize:11,fontFamily:"Georgia,serif",lineHeight:1.4,transition:"all .12s"}}
                        onMouseOver={e=>{e.currentTarget.style.background=`${C.gold}12`;e.currentTarget.style.borderColor=`${C.gold}60`;}}
                        onMouseOut={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor=C.border;}}>
                        <span style={{color:C.gold,flexShrink:0,fontWeight:700}}>→</span>
                        <span>Cap. {c.num} — {c.titulo.slice(0,36)}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* BANCO DO HUB — NOVO em v2 */}
            {(jurCache.length > 0 || bibCache.length > 0) && (
              <div style={{borderBottom:`1px solid ${C.border}`}}>
                <div style={{padding:"8px 14px 0",display:"flex",gap:0}}>
                  {[["jur",`⚖️ ${jurCache.length}`,"#0369a1"],["bib",`📖 ${bibCache.length}`,"#c49a2a"]].map(([id,label,cor])=>(
                    <button key={id} onClick={()=>setHubSec(id)}
                      style={{flex:1,padding:"5px 0",border:"none",background:hubSec===id?C.white:"transparent",cursor:"pointer",fontSize:10,fontFamily:"monospace",color:hubSec===id?cor:C.textTer,fontWeight:hubSec===id?700:400,borderBottom:hubSec===id?`2px solid ${cor}`:"2px solid transparent",transition:"all .15s"}}>
                      {label}
                    </button>
                  ))}
                </div>
                <div style={{maxHeight:140,overflowY:"auto",padding:"6px 8px"}}>
                  {(hubSec==="jur"?jurCache:bibCache).length === 0 ? (
                    <div style={{fontSize:10,color:C.textTer,padding:"8px",textAlign:"center"}}>Banco vazio — adicione no JurHub</div>
                  ) : (hubSec==="jur"?jurCache:bibCache).map((item,i)=>(
                    <div key={item.id} style={{display:"flex",gap:4,alignItems:"flex-start",marginBottom:4}}>
                      <div style={{flex:1,fontSize:10,color:C.textSec,lineHeight:1.5,overflow:"hidden"}}>{item.texto.slice(0,70)}{item.texto.length>70?"...":""}</div>
                      <button onClick={()=>inserirNoBanco(item.texto, `${hubSec}-${i}`)}
                        style={{padding:"2px 6px",background:inserido===`${hubSec}-${i}`?"#f0fdf4":"transparent",border:`1px solid ${inserido===`${hubSec}-${i}`?"#86efac":C.border}`,borderRadius:3,cursor:"pointer",fontSize:9,fontFamily:"monospace",color:inserido===`${hubSec}-${i}`?"#166534":C.textTer,flexShrink:0,transition:"all .15s"}}>
                        {inserido===`${hubSec}-${i}`?"✓":"→"}
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Ações rápidas */}
            <div style={{flex:1,overflowY:"auto",padding:"10px 14px"}}>
              <div style={{fontSize:9,fontFamily:"monospace",color:C.textTer,textTransform:"uppercase",letterSpacing:".07em",marginBottom:6}}>Ações rápidas</div>
              {ACOES.map((a,i)=>(
                <button key={i} onClick={()=>enviar(a.p)}
                  style={{display:"flex",alignItems:"flex-start",gap:7,width:"100%",padding:"7px 9px",marginBottom:4,border:`1px solid ${C.border}`,borderRadius:4,cursor:"pointer",textAlign:"left",background:"transparent",color:C.textSec,fontSize:11,fontFamily:"Georgia,serif",lineHeight:1.4,transition:"all .12s"}}
                  onMouseOver={e=>{e.currentTarget.style.background=`${C.red}0e`;e.currentTarget.style.borderColor=`${C.red}40`;e.currentTarget.style.color=C.textPri;}}
                  onMouseOut={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.textSec;}}>
                  <span style={{flexShrink:0,marginTop:1}}>{a.ic}</span><span>{a.l}</span>
                </button>
              ))}
            </div>

            {/* Rodapé */}
            <div style={{padding:"10px 14px",borderTop:`1px solid ${C.border}`,background:"#f7f3ec"}}>
              <button onClick={()=>setModal("projeto")} style={{width:"100%",padding:"8px",background:C.nav,color:"white",border:"none",borderRadius:4,cursor:"pointer",fontSize:11,fontFamily:"monospace",fontWeight:700,letterSpacing:".04em"}}>
                ⚙️ {projeto.nome?"Editar Projeto":"Configurar Projeto"}
              </button>
            </div>
          </div>
        )}

        {/* ÁREA PRINCIPAL */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

          {/* Painel de upload */}
          {showUpload && (
            <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"14px 20px",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontSize:12,fontWeight:500,color:C.textPri}}>Carregar documento de referência</span>
                <button onClick={()=>setShowUpload(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:C.textTer}}>×</button>
              </div>
              <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                {Object.entries(MODOS_DOC).map(([k,m])=>(
                  <button key={k} onClick={()=>setModoDoc(k)}
                    style={{padding:"4px 10px",border:`1px solid ${modoDoc===k?m.cor:C.border}`,borderRadius:20,fontSize:10,fontFamily:"monospace",cursor:"pointer",background:modoDoc===k?`${m.cor}12`:"transparent",color:modoDoc===k?m.cor:C.textSec,fontWeight:modoDoc===k?700:400,transition:"all .15s"}}>
                    {m.icon} {m.label}
                  </button>
                ))}
              </div>
              <div onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}} onDragOver={e=>e.preventDefault()}
                onClick={()=>fileInputRef.current?.click()}
                style={{border:`2px dashed ${C.border}`,borderRadius:8,padding:"18px",textAlign:"center",cursor:"pointer",background:"#faf8f4",transition:"all .15s"}}
                onMouseOver={e=>{e.currentTarget.style.borderColor=MODOS_DOC[modoDoc].cor;}}
                onMouseOut={e=>{e.currentTarget.style.borderColor=C.border;}}>
                {uploadLoading ? <div style={{fontSize:13,color:C.textSec}}>⏳ Lendo arquivo...</div> : (
                  <><div style={{fontSize:26,marginBottom:6}}>📄</div><div style={{fontSize:12,color:C.textSec}}>Arraste PDF ou DOCX · ou clique · máx. 30MB</div></>
                )}
              </div>
              <input ref={fileInputRef} type="file" accept=".pdf,.docx,.doc" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
              {uploadErr && <div style={{marginTop:8,fontSize:11,color:"#991b1b",fontFamily:"monospace",padding:"6px 10px",background:"#fef2f2",borderRadius:4}}>❌ {uploadErr}</div>}
            </div>
          )}

          {/* Chip do doc carregado */}
          {!showUpload && doc && (
            <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"7px 18px",display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
              <span style={{display:"inline-flex",alignItems:"center",gap:6,padding:"3px 10px",background:`${MODOS_DOC[doc.modoKey]?.cor||C.red}12`,border:`1px solid ${MODOS_DOC[doc.modoKey]?.cor||C.red}30`,borderRadius:12,fontSize:11,fontFamily:"monospace",color:MODOS_DOC[doc.modoKey]?.cor||C.red}}>
                {doc.tipo==="pdf"?"📕":"📝"} {doc.nome.slice(0,28)} · {MODOS_DOC[doc.modoKey]?.icon} {MODOS_DOC[doc.modoKey]?.label}
                <button onClick={()=>setDoc(null)} style={{background:"none",border:"none",cursor:"pointer",color:"inherit",fontSize:12,padding:"0 0 0 4px"}}>×</button>
              </span>
            </div>
          )}

          {/* Chat */}
          <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
            {msgs.length === 0 && (
              <div style={{maxWidth:580,margin:"40px auto 0",textAlign:"center"}}>
                <div style={{fontSize:38,marginBottom:10}}>📚</div>
                <div style={{fontSize:18,fontWeight:700,color:C.textPri,marginBottom:6}}>JurObra v2</div>
                <div style={{fontSize:13,color:C.textSec,lineHeight:1.7,marginBottom:8}}>
                  {projeto.nome ? `📖 ${projeto.nome}` : "Configure o projeto para começar"}
                  {projeto.area && <><br/><span style={{fontSize:12}}>{projeto.area}</span></>}
                </div>
                {(jurCache.length > 0 || bibCache.length > 0) && (
                  <div style={{display:"inline-flex",gap:8,marginBottom:16,padding:"8px 14px",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,fontSize:12,color:"#1e40af"}}>
                    🔗 Banco do Hub: <strong>{jurCache.length} citações</strong> e <strong>{bibCache.length} referências</strong> prontas para usar
                  </div>
                )}
                {!projeto.nome ? (
                  <button onClick={()=>setModal("projeto")} style={{marginTop:12,padding:"10px 24px",background:C.nav,color:"white",border:"none",borderRadius:6,cursor:"pointer",fontSize:13,fontFamily:"Georgia,serif",fontWeight:700}}>
                    ⚙️ Configurar Projeto
                  </button>
                ) : (
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,textAlign:"left"}}>
                    {ACOES.slice(0,4).map((a,i)=>(
                      <button key={i} onClick={()=>enviar(a.p)}
                        style={{padding:"10px 12px",border:`1px solid ${C.border}`,borderRadius:6,cursor:"pointer",background:C.white,textAlign:"left",fontSize:12,color:C.textSec,fontFamily:"Georgia,serif",lineHeight:1.4,transition:"all .12s"}}
                        onMouseOver={e=>{e.currentTarget.style.borderColor=C.gold;e.currentTarget.style.color=C.textPri;}}
                        onMouseOut={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.textSec;}}>
                        {a.ic} {a.l}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )}
            {msgs.map((m,i)=>(
              <div key={i} style={{marginBottom:20,display:"flex",gap:12,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                {m.role==="assistant" && <div style={{width:28,height:28,background:C.red,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0,marginTop:2}}>📚</div>}
                <div style={{maxWidth:"82%",minWidth:0}}>
                  {m.docNome && (
                    <div style={{display:"flex",gap:6,marginBottom:4,justifyContent:"flex-end"}}>
                      <span style={{fontSize:10,fontFamily:"monospace",padding:"2px 8px",background:`${C.red}15`,border:`1px solid ${C.red}30`,borderRadius:10,color:C.red}}>
                        📄 {m.docNome?.slice(0,20)} · {m.docModo}
                      </span>
                    </div>
                  )}
                  <div style={{padding:"12px 16px",borderRadius:m.role==="user"?"16px 4px 16px 16px":"4px 16px 16px 16px",background:m.role==="user"?C.nav:C.white,color:m.role==="user"?"white":C.textPri,border:m.role==="assistant"?`1px solid ${C.border}`:"none",fontSize:13,lineHeight:1.75}}>
                    {m.role==="assistant" ? <RichText content={m.content}/> : <span style={{fontFamily:"Georgia,serif",fontSize:13}}>{typeof m.content==="string"?m.content:"[documento enviado para análise]"}</span>}
                  </div>
                </div>
              </div>
            ))}
            {loading && (
              <div style={{display:"flex",gap:12,marginBottom:20}}>
                <div style={{width:28,height:28,background:C.red,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>📚</div>
                <div style={{padding:"12px 16px",background:C.white,border:`1px solid ${C.border}`,borderRadius:"4px 16px 16px 16px",display:"flex",gap:6,alignItems:"center"}}>
                  {[0,1,2].map(j=><div key={j} style={{width:7,height:7,borderRadius:"50%",background:C.red,opacity:.5,animation:`bounce 1.2s ease-in-out ${j*.2}s infinite`}}/>)}
                </div>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>

          {/* Input */}
          <div style={{borderTop:`1px solid ${C.border}`,background:C.white,padding:"12px 18px"}}>
            <div style={{display:"flex",gap:8,alignItems:"flex-end",maxWidth:900,margin:"0 auto"}}>
              <button onClick={()=>setShowUpload(v=>!v)} title="Carregar PDF ou DOCX"
                style={{width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${doc?C.red:C.border}`,borderRadius:8,cursor:"pointer",background:doc?`${C.red}12`:C.bg,color:doc?C.red:C.textTer,fontSize:18,flexShrink:0,transition:"all .15s"}}>
                📎
              </button>
              <textarea ref={taRef} value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();enviar();}}}
                placeholder={doc ? `Instrução para análise do documento... (ou envie vazio para análise direta)` : `Descreva o capítulo ou tema... (Enter para enviar)`}
                rows={1}
                style={{flex:1,padding:"10px 14px",border:`1px solid ${C.border}`,borderRadius:8,fontFamily:"Georgia,serif",fontSize:13,resize:"none",outline:"none",lineHeight:1.6,overflow:"hidden",background:C.bg,color:C.textPri,transition:"border-color .15s"}}
                onFocus={e=>e.target.style.borderColor=C.gold}
                onBlur={e=>e.target.style.borderColor=C.border}/>
              <button onClick={()=>enviar()} disabled={loading||(!input.trim()&&!doc)}
                style={{padding:"10px 18px",background:loading||(!input.trim()&&!doc)?"#ccc":C.red,color:"white",border:"none",borderRadius:8,cursor:loading||(!input.trim()&&!doc)?"not-allowed":"pointer",fontSize:16,transition:"background .2s",flexShrink:0,height:40}}>
                ↑
              </button>
            </div>
            <div style={{fontSize:10,color:C.textTer,textAlign:"center",marginTop:5,fontFamily:"monospace"}}>
              📎 PDF/DOCX de referência · → inserir do banco · Enter para enviar · ⬇ .docx exporta
            </div>
          </div>
        </div>
      </div>

      {modal==="projeto" && <ModalProjeto projeto={projeto} onSave={salvarProjeto} onClose={()=>setModal(null)}/>}
      {modal==="sumario" && <ModalSumario projeto={projeto} onIntegrar={p=>{salvarProjeto(p);setModal(null);}} onClose={()=>setModal(null)}/>}

      <style>{`@keyframes bounce{0%,80%,100%{transform:scale(0.7);opacity:.4}40%{transform:scale(1);opacity:1}}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}`}</style>
    </div>
  );
}

// ── Montar content do documento para a API ─────────────────────────
function montarContentDoc(doc, modoKey, instrucaoExtra) {
  const modo = MODOS_PECA[modoKey];
  const instrucao = modo.instrucao + (instrucaoExtra ? `\n\nINSTRUÇÃO ADICIONAL DO USUÁRIO:\n${instrucaoExtra}` : "");

  if (doc.tipo === "pdf") {
    return [
      { type: "document", source: { type: "base64", media_type: "application/pdf", data: doc.base64 } },
      { type: "text", text: instrucao },
    ];
  }
  if (doc.tipo === "docx") {
    return [
      { type: "text", text: `DOCUMENTO PARA ANÁLISE (${doc.nome}):\n\n${doc.texto.slice(0, 30000)}\n\n---\n\n${instrucao}` },
    ];
  }
  return [{ type: "text", text: instrucao }];
}

function JurPecaV2() {
  const [tipoKey, setTipoKey]   = useState("peticao");
  const [subtipo, setSubtipo]   = useState(TIPOS_PECA.peticao.subtipos[0]);
  const [area, setArea]         = useState("Direito Processual Civil");
  const [nivel, setNivel]       = useState(NIVEIS_P[0].v);
  const [titulo, setTitulo]     = useState("");
  const [msgs, setMsgs]         = useState([]);
  const [input, setInput]       = useState("");
  const [loading, setLoading]   = useState(false);
  const [exportStatus, setExportStatus] = useState("idle");
  const [sideOpen, setSideOpen] = useState(true);

  // Documentos carregados
  const [docs, setDocs]         = useState([]);
  const [modoDoc, setModoDoc]   = useState("contestacao");
  const [uploadErr, setUploadErr] = useState("");
  const [uploadLoading, setUploadLoading] = useState(false);
  const [showUpload, setShowUpload] = useState(false);

  const fileInputRef = useRef(null);
  const bottomRef    = useRef(null);
  const taRef        = useRef(null);

  const tipo = TIPOS_PECA[tipoKey];

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, loading]);
  useEffect(() => {
    if (taRef.current) { taRef.current.style.height = "auto"; taRef.current.style.height = Math.min(taRef.current.scrollHeight, 160) + "px"; }
  }, [input]);
  useEffect(() => { setSubtipo(TIPOS_PECA[tipoKey].subtipos[0]); setModoDoc(TIPOS_PECA[tipoKey].modoDoc); setMsgs([]); setDocs([]); }, [tipoKey]);

  // Carregar arquivo
  const handleFiles = async (files) => {
    if (!files?.length) return;
    setUploadErr(""); setUploadLoading(true);
    const novos = [];
    for (const file of Array.from(files)) {
      if (docs.length + novos.length >= 3) { setUploadErr("Máximo 3 arquivos por análise."); break; }
      if (file.size > 30 * 1024 * 1024) { setUploadErr(`${file.name}: arquivo muito grande (máx. 30MB).`); continue; }
      try {
        const doc = await lerArquivo(file);
        novos.push({ ...doc, id: Date.now() + Math.random(), modoKey: modoDoc });
      } catch (e) { setUploadErr(e.message || "Erro ao ler o arquivo."); }
    }
    setDocs(prev => [...prev, ...novos]);
    setUploadLoading(false);
    if (novos.length) setShowUpload(false);
  };

  const removerDoc = (id) => setDocs(prev => prev.filter(d => d.id !== id));

  // Drop zone
  const handleDrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
  const handleDragOver = (e) => e.preventDefault();

  // Enviar mensagem (com ou sem documentos)
  const enviar = useCallback(async (texto) => {
    const prompt = texto || input.trim();
    if (!prompt && !docs.length) return;
    if (loading) return;
    setInput("");

    const msgContent = docs.length
      ? [...montarContentDoc(docs[0], docs[0].modoKey, prompt), ...docs.slice(1).flatMap(d => montarContentDoc(d, d.modoKey, ""))]
      : prompt;

    const novasMsgs = [...msgs, { role: "user", content: typeof msgContent === "string" ? msgContent : prompt, docContent: docs.length ? msgContent : null, docNomes: docs.map(d => d.nome) }];
    setMsgs(novasMsgs);
    setLoading(true);

    try {
      const apiMsgs = novasMsgs.map(m => ({
        role: m.role,
        content: m.docContent || m.content,
      }));

      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": getKey(),
          "anthropic-version": "2023-06-01",
          "anthropic-beta": "web-search-2025-03-05",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 8000,
          system: buildSystemPeca(tipoKey, subtipo, area, nivel, docs.length > 0),
          messages: apiMsgs,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
        }),
      });
      const data = await resp.json();
      const txt = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();
      setMsgs(prev => [...prev, { role: "assistant", content: txt || "Sem resposta." }]);
      setDocs([]); // limpa após envio
    } catch (e) {
      setMsgs(prev => [...prev, { role: "assistant", content: "❌ Erro de conexão. Tente novamente." }]);
    } finally { setLoading(false); }
  }, [msgs, input, loading, tipoKey, subtipo, area, nivel, docs]);

  const handleExport = async () => {
    const conteudo = msgs.filter(m => m.role === "assistant").map(m => m.content).join("\n\n");
    if (!conteudo.trim()) return;
    setExportStatus("loading");
    try { await gerarDocxPeca(conteudo, titulo || subtipo, tipo.label + " · " + area); setExportStatus("done"); setTimeout(() => setExportStatus("idle"), 5000); }
    catch (e) { setExportStatus("error"); setTimeout(() => setExportStatus("idle"), 3000); }
  };

  const hasContent = msgs.some(m => m.role === "assistant");
  const C = { bg:"#f5f4f1",white:"white",nav:"#12192e",gold:"#c49a2a",border:"#ddd9d0",textPri:"#111",textSec:"#555",textTer:"#999",cor:tipo.cor };

  return (
    <div style={{ height:"100vh",display:"flex",flexDirection:"column",background:C.bg,fontFamily:"Georgia,serif",color:C.textPri,overflow:"hidden" }}>

      {/* TOP BAR */}
      <div style={{ background:C.nav,padding:"0 18px",display:"flex",alignItems:"center",gap:10,height:48,flexShrink:0,borderBottom:"1px solid #0a1020" }}>
        <button onClick={() => setSideOpen(v=>!v)} style={{ background:"none",border:"none",color:"rgba(255,255,255,.5)",cursor:"pointer",fontSize:16 }}>☰</button>
        <span style={{ color:C.gold,fontFamily:"monospace",fontWeight:700,fontSize:13,letterSpacing:".1em" }}>JURPEÇA</span>
        <span style={{ background:`${C.gold}25`,border:`1px solid ${C.gold}55`,color:C.gold,fontSize:9,padding:"2px 8px",borderRadius:2,fontFamily:"monospace" }}>v2 · ANÁLISE DE DOCS</span>
        <div style={{ width:1,height:20,background:"rgba(255,255,255,.1)",margin:"0 4px" }}/>
        <span style={{ fontSize:12,color:"rgba(255,255,255,.6)" }}>{tipo.icon} {tipo.label}</span>
        <span style={{ fontSize:11,color:"rgba(255,255,255,.3)",fontFamily:"monospace" }}>· {subtipo}</span>
        <div style={{ marginLeft:"auto",display:"flex",gap:8,alignItems:"center" }}>
          {hasContent && <button onClick={handleExport} disabled={exportStatus==="loading"} style={{ padding:"5px 14px",background:exportStatus==="done"?"#166534":tipo.cor,color:"white",border:"none",borderRadius:3,fontSize:11,fontFamily:"monospace",cursor:"pointer",transition:"background .2s" }}>{exportStatus==="loading"?"⏳...":exportStatus==="done"?"✅ gerado!":"⬇ .docx"}</button>}
          {msgs.length>0 && <button onClick={()=>{if(window.confirm("Limpar conversa?"))setMsgs([]);}} style={{ padding:"5px 10px",background:"transparent",color:"rgba(255,255,255,.3)",border:"1px solid rgba(255,255,255,.1)",borderRadius:3,fontSize:10,fontFamily:"monospace",cursor:"pointer" }}>limpar</button>}
        </div>
      </div>

      <div style={{ flex:1,display:"flex",overflow:"hidden" }}>

        {/* SIDEBAR */}
        {sideOpen && (
          <div style={{ width:240,background:C.white,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0 }}>
            {/* Tipo */}
            <div style={{ padding:"12px 14px 10px",borderBottom:`1px solid ${C.border}` }}>
              <div style={{ fontSize:9,fontFamily:"monospace",color:C.textTer,textTransform:"uppercase",letterSpacing:".07em",marginBottom:6 }}>Tipo de peça</div>
              {Object.entries(TIPOS_PECA).map(([k,t])=>(
                <button key={k} onClick={()=>setTipoKey(k)} style={{ display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 10px",marginBottom:3,border:"none",borderRadius:4,cursor:"pointer",textAlign:"left",background:tipoKey===k?`${t.cor}15`:"transparent",color:tipoKey===k?t.cor:C.textSec,fontWeight:tipoKey===k?700:400,borderLeft:tipoKey===k?`3px solid ${t.cor}`:"3px solid transparent",fontSize:13,fontFamily:"Georgia,serif",transition:"all .15s" }}>
                  {t.icon} {t.label}
                </button>
              ))}
            </div>
            {/* Subtipo + área + nível */}
            <div style={{ padding:"10px 14px",borderBottom:`1px solid ${C.border}` }}>
              <div style={{ fontSize:9,fontFamily:"monospace",color:C.textTer,textTransform:"uppercase",letterSpacing:".07em",marginBottom:4 }}>Subtipo</div>
              <select value={subtipo} onChange={e=>setSubtipo(e.target.value)} style={{ width:"100%",padding:"6px 8px",border:`1px solid ${C.border}`,borderRadius:4,fontFamily:"Georgia,serif",fontSize:12,color:C.textPri,background:C.bg,outline:"none",marginBottom:8 }}>
                {tipo.subtipos.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
              <div style={{ fontSize:9,fontFamily:"monospace",color:C.textTer,textTransform:"uppercase",letterSpacing:".07em",marginBottom:4 }}>Área jurídica</div>
              <select value={area} onChange={e=>setArea(e.target.value)} style={{ width:"100%",padding:"6px 8px",border:`1px solid ${C.border}`,borderRadius:4,fontFamily:"Georgia,serif",fontSize:12,color:C.textPri,background:C.bg,outline:"none",marginBottom:8 }}>
                {AREAS.map(a=><option key={a} value={a}>{a}</option>)}
              </select>
              <div style={{ fontSize:9,fontFamily:"monospace",color:C.textTer,textTransform:"uppercase",letterSpacing:".07em",marginBottom:4 }}>Nível</div>
              <select value={nivel} onChange={e=>setNivel(e.target.value)} style={{ width:"100%",padding:"6px 8px",border:`1px solid ${C.border}`,borderRadius:4,fontFamily:"Georgia,serif",fontSize:12,color:C.textPri,background:C.bg,outline:"none" }}>
                {NIVEIS_P.map(n=><option key={n.v} value={n.v}>{n.l}</option>)}
              </select>
            </div>
            {/* Título export */}
            <div style={{ padding:"10px 14px",borderBottom:`1px solid ${C.border}` }}>
              <div style={{ fontSize:9,fontFamily:"monospace",color:C.textTer,textTransform:"uppercase",letterSpacing:".07em",marginBottom:4 }}>Título (.docx)</div>
              <input value={titulo} onChange={e=>setTitulo(e.target.value)} placeholder={subtipo} style={{ width:"100%",padding:"6px 8px",border:`1px solid ${C.border}`,borderRadius:4,fontFamily:"Georgia,serif",fontSize:12,color:C.textPri,background:C.bg,outline:"none",boxSizing:"border-box" }}/>
            </div>
            {/* Ações rápidas */}
            <div style={{ flex:1,overflowY:"auto",padding:"10px 14px" }}>
              <div style={{ fontSize:9,fontFamily:"monospace",color:C.textTer,textTransform:"uppercase",letterSpacing:".07em",marginBottom:8 }}>Ações rápidas</div>
              {tipo.acoes.map((a,i)=>(
                <button key={i} onClick={()=>enviar(a.p)} style={{ display:"flex",alignItems:"flex-start",gap:7,width:"100%",padding:"8px 9px",marginBottom:4,border:`1px solid ${C.border}`,borderRadius:4,cursor:"pointer",textAlign:"left",background:"transparent",color:C.textSec,fontSize:12,fontFamily:"Georgia,serif",lineHeight:1.4,transition:"all .12s" }}
                  onMouseOver={e=>{e.currentTarget.style.background=`${tipo.cor}10`;e.currentTarget.style.borderColor=`${tipo.cor}40`;e.currentTarget.style.color=C.textPri;}}
                  onMouseOut={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.textSec;}}>
                  <span style={{flexShrink:0,marginTop:1}}>{a.ic}</span><span>{a.l}</span>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* CHAT */}
        <div style={{ flex:1,display:"flex",flexDirection:"column",overflow:"hidden" }}>

          {/* Painel de upload (colapsável) */}
          {showUpload && (
            <div style={{ background:C.white,borderBottom:`1px solid ${C.border}`,padding:"14px 20px",flexShrink:0 }}>
              <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10 }}>
                <span style={{ fontSize:12,fontWeight:500,color:C.textPri }}>Carregar documento para análise</span>
                <button onClick={()=>setShowUpload(false)} style={{ background:"none",border:"none",cursor:"pointer",fontSize:16,color:C.textTer }}>×</button>
              </div>
              {/* Modo de análise */}
              <div style={{ display:"flex",gap:6,marginBottom:10,flexWrap:"wrap" }}>
                {Object.entries(MODOS_PECA).map(([k,m])=>(
                  <button key={k} onClick={()=>setModoDoc(k)} style={{ padding:"5px 12px",border:`1px solid ${modoDoc===k?m.cor:C.border}`,borderRadius:20,fontSize:11,fontFamily:"monospace",cursor:"pointer",background:modoDoc===k?`${m.cor}15`:"transparent",color:modoDoc===k?m.cor:C.textSec,transition:"all .15s",fontWeight:modoDoc===k?700:400 }}>
                    {m.icon} {m.label}
                  </button>
                ))}
              </div>
              <div style={{ fontSize:11,color:C.textTer,marginBottom:8,padding:"6px 10px",background:`${MODOS_PECA[modoDoc].cor}10`,borderRadius:4,borderLeft:`3px solid ${MODOS_PECA[modoDoc].cor}` }}>
                {MODOS_PECA[modoDoc].desc}
              </div>
              {/* Drop zone */}
              <div onDrop={handleDrop} onDragOver={handleDragOver}
                onClick={()=>fileInputRef.current?.click()}
                style={{ border:`2px dashed ${C.border}`,borderRadius:8,padding:"20px",textAlign:"center",cursor:"pointer",background:"#faf8f4",transition:"all .15s" }}
                onMouseOver={e=>{e.currentTarget.style.borderColor=MODOS_PECA[modoDoc].cor;e.currentTarget.style.background=`${MODOS_PECA[modoDoc].cor}08`;}}
                onMouseOut={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background="#faf8f4";}}>
                {uploadLoading ? (
                  <div style={{ fontSize:13,color:C.textSec }}>⏳ Lendo arquivo...</div>
                ) : (
                  <>
                    <div style={{ fontSize:28,marginBottom:6 }}>📄</div>
                    <div style={{ fontSize:13,color:C.textSec,marginBottom:3 }}>Arraste PDF ou DOCX aqui</div>
                    <div style={{ fontSize:11,color:C.textTer }}>ou clique para selecionar · máx. 30MB por arquivo · até 3 arquivos</div>
                  </>
                )}
              </div>
              <input ref={fileInputRef} type="file" accept=".pdf,.docx,.doc" multiple style={{ display:"none" }} onChange={e=>handleFiles(e.target.files)}/>
              {uploadErr && <div style={{ marginTop:8,fontSize:11,color:"#991b1b",fontFamily:"monospace",padding:"6px 10px",background:"#fef2f2",borderRadius:4 }}>❌ {uploadErr}</div>}
              {/* Docs carregados */}
              {docs.length > 0 && (
                <div style={{ marginTop:10 }}>
                  {docs.map(d=>(
                    <div key={d.id} style={{ display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:`${MODOS_PECA[d.modoKey].cor}10`,border:`1px solid ${MODOS_PECA[d.modoKey].cor}30`,borderRadius:6,marginBottom:6 }}>
                      <span style={{ fontSize:14 }}>{d.tipo==="pdf"?"📕":"📝"}</span>
                      <div style={{ flex:1,minWidth:0 }}>
                        <div style={{ fontSize:12,fontWeight:500,color:C.textPri,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{d.nome}</div>
                        <div style={{ fontSize:10,fontFamily:"monospace",color:MODOS_PECA[d.modoKey].cor }}>
                          {MODOS_PECA[d.modoKey].icon} {MODOS_PECA[d.modoKey].label} · {d.tipo.toUpperCase()} · {(d.size/1024).toFixed(0)}KB
                        </div>
                      </div>
                      <select value={d.modoKey} onChange={e=>{const k=e.target.value;setDocs(prev=>prev.map(x=>x.id===d.id?{...x,modoKey:k}:x));}} style={{ fontSize:10,fontFamily:"monospace",border:`1px solid ${C.border}`,borderRadius:4,background:C.bg,padding:"2px 4px",color:C.textSec,outline:"none" }}>
                        {Object.entries(MODOS_PECA).map(([k,m])=><option key={k} value={k}>{m.icon} {m.label}</option>)}
                      </select>
                      <button onClick={()=>removerDoc(d.id)} style={{ background:"none",border:"none",cursor:"pointer",color:C.textTer,fontSize:16,padding:"0 4px" }}>×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Chips de docs quando upload fechado */}
          {!showUpload && docs.length > 0 && (
            <div style={{ background:C.white,borderBottom:`1px solid ${C.border}`,padding:"8px 18px",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",flexShrink:0 }}>
              <span style={{ fontSize:10,fontFamily:"monospace",color:C.textTer }}>Docs carregados:</span>
              {docs.map(d=>(
                <span key={d.id} style={{ display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",background:`${MODOS_PECA[d.modoKey].cor}12`,border:`1px solid ${MODOS_PECA[d.modoKey].cor}30`,borderRadius:12,fontSize:11,fontFamily:"monospace",color:MODOS_PECA[d.modoKey].cor }}>
                  {d.tipo==="pdf"?"📕":"📝"} {d.nome.slice(0,25)}{d.nome.length>25?"...":""} · {MODOS_PECA[d.modoKey].icon}
                  <button onClick={()=>removerDoc(d.id)} style={{ background:"none",border:"none",cursor:"pointer",color:"inherit",fontSize:12,padding:"0 0 0 4px",lineHeight:1 }}>×</button>
                </span>
              ))}
            </div>
          )}

          {/* Mensagens */}
          <div style={{ flex:1,overflowY:"auto",padding:"20px 24px" }}>
            {msgs.length === 0 && (
              <div style={{ maxWidth:560,margin:"40px auto 0",textAlign:"center" }}>
                <div style={{ fontSize:36,marginBottom:10 }}>{tipo.icon}</div>
                <div style={{ fontSize:18,fontWeight:700,color:C.textPri,marginBottom:6 }}>{tipo.label} v2</div>
                <div style={{ fontSize:13,color:C.textSec,lineHeight:1.7,marginBottom:20 }}>
                  {subtipo} · {area}<br/>
                  <strong style={{ color:C.textPri }}>Novo:</strong> carregue PDF/DOCX para análise estratégica completa
                </div>
                {/* Card de destaque dos modos */}
                <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16,textAlign:"left" }}>
                  {Object.entries(MODOS_PECA).map(([k,m])=>(
                    <button key={k} onClick={()=>{setModoDoc(k);setShowUpload(true);}} style={{ padding:"10px 12px",border:`1px solid ${C.border}`,borderRadius:6,cursor:"pointer",background:C.white,textAlign:"left",fontSize:12,color:C.textSec,fontFamily:"Georgia,serif",lineHeight:1.5,transition:"all .12s" }}
                      onMouseOver={e=>{e.currentTarget.style.borderColor=m.cor;e.currentTarget.style.color=C.textPri;}}
                      onMouseOut={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.textSec;}}>
                      <div style={{ fontSize:14,marginBottom:3 }}>{m.icon}</div>
                      <div style={{ fontWeight:500,color:C.textPri,fontSize:11 }}>{m.label}</div>
                      <div style={{ fontSize:10,color:C.textTer,marginTop:2 }}>{m.desc}</div>
                    </button>
                  ))}
                </div>
                <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,textAlign:"left" }}>
                  {tipo.acoes.slice(0,4).map((a,i)=>(
                    <button key={i} onClick={()=>enviar(a.p)} style={{ padding:"10px 12px",border:`1px solid ${C.border}`,borderRadius:6,cursor:"pointer",background:C.white,textAlign:"left",fontSize:12,color:C.textSec,fontFamily:"Georgia,serif",lineHeight:1.4,transition:"all .12s" }}
                      onMouseOver={e=>{e.currentTarget.style.borderColor=tipo.cor;e.currentTarget.style.color=C.textPri;}}
                      onMouseOut={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.textSec;}}>
                      {a.ic} {a.l}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {msgs.map((m,i)=>(
              <div key={i} style={{ marginBottom:20,display:"flex",gap:12,justifyContent:m.role==="user"?"flex-end":"flex-start" }}>
                {m.role==="assistant" && <div style={{ width:28,height:28,background:tipo.cor,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0,marginTop:2 }}>{tipo.icon}</div>}
                <div style={{ maxWidth:"82%",minWidth:0 }}>
                  {m.docNomes?.length > 0 && (
                    <div style={{ display:"flex",gap:6,marginBottom:4,flexWrap:"wrap",justifyContent:"flex-end" }}>
                      {m.docNomes.map((n,j)=><span key={j} style={{ fontSize:10,fontFamily:"monospace",padding:"2px 8px",background:`${tipo.cor}15`,border:`1px solid ${tipo.cor}30`,borderRadius:10,color:tipo.cor }}>📄 {n.slice(0,20)}</span>)}
                    </div>
                  )}
                  <div style={{ padding:"12px 16px",borderRadius:m.role==="user"?"16px 4px 16px 16px":"4px 16px 16px 16px",background:m.role==="user"?C.nav:C.white,color:m.role==="user"?"white":C.textPri,border:m.role==="assistant"?`1px solid ${C.border}`:"none",fontSize:13,lineHeight:1.75 }}>
                    {m.role==="assistant" ? <RichText content={m.content}/> : <span style={{ fontFamily:"Georgia,serif",fontSize:13 }}>{typeof m.content==="string"?m.content:"[documento enviado para análise]"}</span>}
                  </div>
                </div>
              </div>
            ))}

            {loading && (
              <div style={{ display:"flex",gap:12,marginBottom:20 }}>
                <div style={{ width:28,height:28,background:tipo.cor,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0 }}>{tipo.icon}</div>
                <div style={{ padding:"12px 16px",background:C.white,border:`1px solid ${C.border}`,borderRadius:"4px 16px 16px 16px",display:"flex",gap:6,alignItems:"center" }}>
                  {[0,1,2].map(j=><div key={j} style={{ width:7,height:7,borderRadius:"50%",background:tipo.cor,opacity:.5,animation:`bounce 1.2s ease-in-out ${j*.2}s infinite` }}/>)}
                </div>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>

          {/* INPUT */}
          <div style={{ borderTop:`1px solid ${C.border}`,background:C.white,padding:"12px 18px" }}>
            <div style={{ display:"flex",gap:8,alignItems:"flex-end",maxWidth:880,margin:"0 auto" }}>

              {/* Botão de upload de documento */}
              <button onClick={()=>setShowUpload(v=>!v)} title="Carregar PDF ou DOCX para análise"
                style={{ width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${docs.length>0?tipo.cor:C.border}`,borderRadius:8,cursor:"pointer",background:docs.length>0?`${tipo.cor}15`:C.bg,color:docs.length>0?tipo.cor:C.textTer,fontSize:18,flexShrink:0,position:"relative",transition:"all .15s" }}>
                📎
                {docs.length > 0 && <span style={{ position:"absolute",top:-6,right:-6,width:16,height:16,background:tipo.cor,borderRadius:"50%",fontSize:9,fontWeight:700,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"monospace" }}>{docs.length}</span>}
              </button>

              <textarea ref={taRef} value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();enviar();}}}
                placeholder={docs.length > 0 ? `Instrução adicional para análise do${docs.length>1?"s":""} documento${docs.length>1?"s":""}... (ou envie sem texto)` : `Descreva a situação para ${tipo.label.toLowerCase()}... (Enter para enviar)`}
                rows={1}
                style={{ flex:1,padding:"10px 14px",border:`1px solid ${C.border}`,borderRadius:8,fontFamily:"Georgia,serif",fontSize:13,resize:"none",outline:"none",lineHeight:1.6,overflow:"hidden",background:C.bg,color:C.textPri,transition:"border-color .15s" }}
                onFocus={e=>e.target.style.borderColor=tipo.cor}
                onBlur={e=>e.target.style.borderColor=C.border}/>

              <button onClick={()=>enviar()} disabled={loading||(!input.trim()&&!docs.length)}
                style={{ padding:"10px 18px",background:loading||(!input.trim()&&!docs.length)?"#ccc":tipo.cor,color:"white",border:"none",borderRadius:8,cursor:loading||(!input.trim()&&!docs.length)?"not-allowed":"pointer",fontSize:16,transition:"background .2s",flexShrink:0,height:40 }}>
                ↑
              </button>
            </div>
            <div style={{ fontSize:10,color:C.textTer,textAlign:"center",marginTop:5,fontFamily:"monospace" }}>
              📎 carregar PDF/DOCX · Enter para enviar · Shift+Enter para nova linha · ⬇ .docx exporta a peça
            </div>
          </div>
        </div>
      </div>

      <style>{`@keyframes bounce{0%,80%,100%{transform:scale(0.7);opacity:.4}40%{transform:scale(1);opacity:1}}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}`}</style>
    </div>
  );
}

• Lei 6.385/1976 (CVM e Mercado de Valores Mobiliários)

✗ NUNCA cite instrução CVM revogada como vigente — use a Resolução CVM correspondente
✗ NUNCA invente números de PAS CVM, processos ou julgados sem confirmar
✗ Se não confirmado → "a CVM tem entendimento consolidado no sentido de..." / "conforme a prática de mercado..."
✓ Indique sempre se a norma foi revogada ou alterada
✓ Para teses regulatórias: cite precedente administrativo (PAS CVM, CRSFN) quando disponível
✓ Terminologia de mercado: use linguagem técnica precisa — underwriting, bookbuilding, carve-out, covenant, waterfall, OIC, FIDC, FII, FIP

• Linguagem técnico-regulatória precisa
• Termos estrangeiros em *itálico* quando não incorporados ao vernáculo jurídico
• Estrutura: numeração com algarismos romanos para seções principais (I, II, III...)
• Ao final de análises: § de recomendação prática / conclusão operacional`;
}

async function jfLerArquivo(file){
  const ext=file.name.split(".").pop().toLowerCase();
  if(ext==="pdf"){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{res({tipo:"pdf",base64:e.target.result.split(",")[1],nome:file.name,size:file.size});};r.onerror=rej;r.readAsDataURL(file);});}
  if(["docx","doc"].includes(ext)){return new Promise((res,rej)=>{const r=new FileReader();r.onload=async e=>{try{const x=await mammoth.extractRawText({arrayBuffer:e.target.result});res({tipo:"docx",texto:x.value,nome:file.name,size:file.size});}catch(e){rej(e);}};r.onerror=rej;r.readAsArrayBuffer(file);});}
  throw new Error("Use PDF ou DOCX.");
}

function JFRichText({content}){
  return(<div style={{lineHeight:1.75,fontSize:13}}>
    {content.split("\n").map((line,i)=>{
      if(!line.trim())return<div key={i} style={{height:8}}/>;
      const parts=[];const re=/(\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/g;let last=0,m;
      while((m=re.exec(line))!==null){if(m.index>last)parts.push(<span key={last}>{line.slice(last,m.index)}</span>);const tok=m[0];if(tok.startsWith("**"))parts.push(<strong key={m.index}>{tok.slice(2,-2)}</strong>);else if(tok.startsWith("*"))parts.push(<em key={m.index}>{tok.slice(1,-1)}</em>);else parts.push(<code key={m.index} style={{background:"rgba(0,0,0,.07)",padding:"1px 5px",borderRadius:3,fontFamily:"monospace",fontSize:11}}>{tok.slice(1,-1)}</code>);last=m.index+tok.length;}
      if(last<line.length)parts.push(<span key={last}>{line.slice(last)}</span>);
      return<div key={i}>{parts}</div>;
    })}
  </div>);
}

    if(doc){
      const instrucao=prompt||`Analise este documento conforme o tipo "${tipo.label}" e as normas regulatórias vigentes.`;

          {showUpload&&(
            <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"14px 20px",flexShrink:0}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontSize:12,fontWeight:500,color:C.textPri}}>Carregar documento regulatório para análise</span>
                <button onClick={()=>setShowUpload(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:C.textTer}}>×</button>
              </div>
              <div onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}} onDragOver={e=>e.preventDefault()}
                onClick={()=>fileInputRef.current?.click()}
                style={{border:`2px dashed ${C.border}`,borderRadius:8,padding:"18px",textAlign:"center",cursor:"pointer",background:"#faf8f4",transition:"all .15s"}}
                onMouseOver={e=>{e.currentTarget.style.borderColor=tipo.cor;}} onMouseOut={e=>{e.currentTarget.style.borderColor=C.border;}}>
                {uploadLoading?<div style={{fontSize:13,color:C.textSec}}>⏳ Lendo arquivo...</div>:<><div style={{fontSize:26,marginBottom:6}}>📄</div><div style={{fontSize:12,color:C.textSec}}>Arraste PDF ou DOCX · ou clique · máx. 30MB</div><div style={{fontSize:11,color:C.textTer,marginTop:3}}>Contrato bancário · PAS CVM · Prospecto · Escritura · Norma regulatória</div></>}
              </div>
              <input ref={fileInputRef} type="file" accept=".pdf,.docx,.doc" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
              {uploadErr&&<div style={{marginTop:8,fontSize:11,color:"#991b1b",padding:"6px 10px",background:"#fef2f2",borderRadius:4,fontFamily:"monospace"}}>❌ {uploadErr}</div>}
            </div>
          )}

          {/* Chip doc carregado */}
          {!showUpload&&doc&&(
            <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"7px 18px",display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
              <span style={{display:"inline-flex",alignItems:"center",gap:6,padding:"3px 10px",background:`${tipo.cor}12`,border:`1px solid ${tipo.cor}30`,borderRadius:12,fontSize:11,fontFamily:"monospace",color:tipo.cor}}>
                {doc.tipo==="pdf"?"📕":"📝"} {doc.nome.slice(0,30)} · {tipo.icon} {tipo.label}
                <button onClick={()=>setDoc(null)} style={{background:"none",border:"none",cursor:"pointer",color:"inherit",fontSize:12,padding:"0 0 0 4px"}}>×</button>
              </span>
            </div>
          )}

          {/* Messages */}
          <div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
            {msgs.length===0&&(
              <div style={{maxWidth:580,margin:"36px auto 0",textAlign:"center"}}>
                <div style={{fontSize:36,marginBottom:10}}>{tipo.icon}</div>
                <div style={{fontSize:18,fontWeight:700,color:C.textPri,marginBottom:6}}>JurFinanceiro</div>
                <div style={{fontSize:13,color:C.textSec,lineHeight:1.7,marginBottom:6}}>{tipo.label}</div>
                <div style={{fontSize:11,color:C.textTer,fontFamily:"monospace",marginBottom:20}}>{tipo.desc}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,textAlign:"left",marginBottom:16}}>
                  {tipo.acoes.slice(0,4).map((a,i)=>(
                    <button key={i} onClick={()=>enviar(a.p)}
                      style={{padding:"10px 12px",border:`1px solid ${C.border}`,borderRadius:6,cursor:"pointer",background:C.white,textAlign:"left",fontSize:12,color:C.textSec,fontFamily:"Georgia,serif",lineHeight:1.4,transition:"all .12s"}}
                      onMouseOver={e=>{e.currentTarget.style.borderColor=tipo.cor;e.currentTarget.style.color=C.textPri;}}
                      onMouseOut={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.textSec;}}>
                      {a.ic} {a.l}
                    </button>
                  ))}
                </div>
                <div style={{marginTop:14,padding:"10px 16px",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,fontSize:11,color:"#1e40af",textAlign:"left"}}>
                  💡 <strong>Dica:</strong> Use 📎 para carregar um contrato bancário, escritura, prospecto ou PAS CVM — a IA analisa e elabora a peça correspondente diretamente.
                </div>
              </div>
            )}
            {msgs.map((m,i)=>(
              <div key={i} style={{marginBottom:20,display:"flex",gap:12,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                {m.role==="assistant"&&<div style={{width:28,height:28,background:tipo.cor,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0,marginTop:2}}>{tipo.icon}</div>}
                <div style={{maxWidth:"82%",minWidth:0}}>
                  {m.docNome&&<div style={{display:"flex",gap:6,marginBottom:4,justifyContent:"flex-end"}}><span style={{fontSize:10,fontFamily:"monospace",padding:"2px 8px",background:`${tipo.cor}15`,border:`1px solid ${tipo.cor}30`,borderRadius:10,color:tipo.cor}}>📄 {m.docNome?.slice(0,22)}</span></div>}
                  <div style={{padding:"12px 16px",borderRadius:m.role==="user"?"16px 4px 16px 16px":"4px 16px 16px 16px",background:m.role==="user"?C.nav:C.white,color:m.role==="user"?"white":C.textPri,border:m.role==="assistant"?`1px solid ${C.border}`:"none",fontSize:13,lineHeight:1.75}}>
                    {m.role==="assistant"?<JFRichText content={m.content}/>:<span style={{fontFamily:"Georgia,serif",fontSize:13}}>{typeof m.content==="string"?m.content:"[documento enviado para análise]"}</span>}
                  </div>
                </div>
              </div>
            ))}
            {loading&&(
              <div style={{display:"flex",gap:12,marginBottom:20}}>
                <div style={{width:28,height:28,background:tipo.cor,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{tipo.icon}</div>
                <div style={{padding:"12px 16px",background:C.white,border:`1px solid ${C.border}`,borderRadius:"4px 16px 16px 16px",display:"flex",gap:6,alignItems:"center"}}>
                  {[0,1,2].map(j=><div key={j} style={{width:7,height:7,borderRadius:"50%",background:tipo.cor,opacity:.5,animation:`bounce 1.2s ease-in-out ${j*.2}s infinite`}}/>)}
                </div>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>

          {/* Input */}
          <div style={{borderTop:`1px solid ${C.border}`,background:C.white,padding:"12px 18px"}}>
            <div style={{display:"flex",gap:8,alignItems:"flex-end",maxWidth:900,margin:"0 auto"}}>
              <button onClick={()=>setShowUpload(v=>!v)} title="Carregar PDF ou DOCX regulatório"
                style={{width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${doc?tipo.cor:C.border}`,borderRadius:8,cursor:"pointer",background:doc?`${tipo.cor}12`:C.bg,color:doc?tipo.cor:C.textTer,fontSize:18,flexShrink:0,transition:"all .15s"}}>
                📎
              </button>
              <textarea ref={taRef} value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();enviar();}}}
                placeholder={doc?"Instrução adicional para a análise do documento...":"Descreva a operação, questão regulatória ou caso... (Enter para enviar)"}
                rows={1}
                style={{flex:1,padding:"10px 14px",border:`1px solid ${C.border}`,borderRadius:8,fontFamily:"Georgia,serif",fontSize:13,resize:"none",outline:"none",lineHeight:1.6,overflow:"hidden",background:C.bg,color:C.textPri,transition:"border-color .15s"}}
                onFocus={e=>e.target.style.borderColor=tipo.cor}
                onBlur={e=>e.target.style.borderColor=C.border}/>
              <button onClick={()=>enviar()} disabled={loading||(!input.trim()&&!doc)}
                style={{padding:"10px 18px",background:loading||(!input.trim()&&!doc)?"#ccc":tipo.cor,color:"white",border:"none",borderRadius:8,cursor:loading||(!input.trim()&&!doc)?"not-allowed":"pointer",fontSize:16,transition:"background .2s",flexShrink:0,height:40}}>
                ↑
              </button>
            </div>
            <div style={{fontSize:10,color:C.textTer,textAlign:"center",marginTop:5,fontFamily:"monospace"}}>
              📎 PDF/DOCX regulatório · 📚 Normativas ({JF_NORMATIVAS.length}) · Enter para enviar · ⬇ .docx
            </div>
          </div>
        </div>
      </div>

      {showNorm&&<JFModalNormativas onClose={()=>setShowNorm(false)} onUsar={usarNormativa}/>}
    </div>
  );
}

// ── APP SHELL ─────────────────────────────────────────────────────
function App(){
  const[hasKey,setHasKey]=useState(!!getKey());
  const[activeId,setActiveId]=useState('hub');
  const[collapsed,setCollapsed]=useState(false);

  if(!hasKey)return <KeySetup onSave={()=>setHasKey(true)}/>;

  const navItems=[
    {id:'hub',icon:'🏠',label:'JurHub',desc:'Projeto · Bancos · Export · Artefatos',cor:'#c49a2a'},
    {id:'obra',icon:'📚',label:'JurObra',desc:'Livros · Tratados',cor:'#8b1a1a'},
    {id:'peca',icon:'⚖️',label:'JurPeça v2',desc:'Petição · Parecer · Análise',cor:'#7c3aed'},
    {id:'fin',icon:'📑',label:'JurFinanceiro',desc:'Bancário · MC',cor:'#0369a1'},
    {id:'bib',icon:'📖',label:'JurBiblioteca',desc:'Doutrina · ABNT · 78 obras',cor:'#c49a2a'},
    {id:'jur',icon:'🏛️',label:'JurJurisprudência',desc:'STF · STJ · TST',cor:'#0369a1'},
    {id:'docx',icon:'📄',label:'JurDocx Engine',desc:'Gerar .docx · Notas · ZIP',cor:'#166534'},
  ];

  const renderTool=()=>{
    if(activeId==='hub')return <HubTool/>;
    if(activeId==='obra')return <JurObraV2/>;
    if(activeId==='bib')return <BibTool/>;
    if(activeId==='jur')return <JurTool/>;
    if(activeId==='docx')return <JurDocxEngine/>;
    if(activeId==='peca')return <JurPecaV2/>;
    if(activeId==='fin')return <JurFinanceiro/>;
    const tool=TOOLS[activeId];
    if(!tool)return null;
    return <ChatTool key={activeId} tool={tool}/>;
  };

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#f5f4f1'}}>
      {/* Sidebar */}
      <div style={{width:collapsed?52:210,background:'#12192e',display:'flex',flexDirection:'column',flexShrink:0,transition:'width .2s ease',overflow:'hidden',borderRight:'1px solid #0a1020'}}>
        <div style={{padding:collapsed?'14px 0':'14px 16px',display:'flex',alignItems:'center',gap:10,borderBottom:'1px solid rgba(255,255,255,.08)',justifyContent:collapsed?'center':'flex-start'}}>
          {!collapsed&&<><span style={{color:'#c49a2a',fontFamily:'monospace',fontWeight:700,fontSize:13,letterSpacing:'.1em',whiteSpace:'nowrap'}}>JUREDIT</span><span style={{background:'rgba(196,154,42,.2)',border:'1px solid rgba(196,154,42,.4)',color:'#c49a2a',fontSize:8,padding:'1px 6px',borderRadius:2,fontFamily:'monospace',whiteSpace:'nowrap'}}>v2</span></>}
          <button onClick={()=>setCollapsed(v=>!v)} style={{marginLeft:'auto',background:'none',border:'none',color:'rgba(255,255,255,.4)',cursor:'pointer',fontSize:16,padding:'0 4px',lineHeight:1,flexShrink:0}}>{collapsed?'›':'‹'}</button>
        </div>
        <nav style={{flex:1,padding:'8px 6px',overflowY:'auto'}}>
          {navItems.map(t=>{
            const isActive=activeId===t.id;
            return(
              <button key={t.id} onClick={()=>setActiveId(t.id)} title={collapsed?t.label:undefined}
                style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:collapsed?'10px 0':'9px 10px',marginBottom:3,border:'none',borderRadius:6,cursor:'pointer',textAlign:'left',justifyContent:collapsed?'center':'flex-start',background:isActive?`${t.cor}25`:'transparent',borderLeft:isActive&&!collapsed?`3px solid ${t.cor}`:'3px solid transparent',transition:'all .15s'}}>
                <span style={{fontSize:16,flexShrink:0}}>{t.icon}</span>
                {!collapsed&&<div style={{minWidth:0}}><div style={{fontSize:12,fontWeight:isActive?700:400,color:isActive?t.cor:'rgba(255,255,255,.65)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.label}</div><div style={{fontSize:10,color:'rgba(255,255,255,.3)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',fontFamily:'monospace'}}>{t.desc}</div></div>}
              </button>
            );
          })}
        </nav>
        {!collapsed&&(
          <div style={{padding:'8px 12px',borderTop:'1px solid rgba(255,255,255,.06)'}}>
            <button onClick={()=>{if(confirm('Alterar chave API?')){localStorage.removeItem(KEY_STORE);setHasKey(false);}}} style={{width:'100%',padding:'6px',background:'transparent',border:'1px solid rgba(255,255,255,.1)',borderRadius:4,cursor:'pointer',color:'rgba(255,255,255,.3)',fontSize:10,fontFamily:'monospace'}}>🔑 Alterar chave API</button>
          </div>
        )}
      </div>
      {/* Main */}
      <div style={{flex:1,overflow:'hidden'}}>
        {renderTool()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
